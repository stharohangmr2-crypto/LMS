          ` : `
            <div class="flex-1 overflow-y-auto relative px-4 sm:px-8 py-6">
              <div class="notebook-margin"></div>
              <textarea id="notebook-input" spellcheck="false" ${isReadOnly ? 'readonly' : ''}
                class="notebook-paper font-hand w-full min-h-full outline-none resize-none text-[22px] text-ink/85 pl-16 pr-4 ${isReadOnly ? 'opacity-80' : ''}"
                placeholder="Start writing here...">${escapeHtml(prefill)}</textarea>
            </div>
          `}
          <div id="workspace-footer" class="shrink-0 px-6 sm:px-8 py-4 border-t border-ink/10 flex items-center justify-between gap-4 bg-papercard">
            ${isReadOnly ? `
              <p class="text-xs text-graphite flex items-center gap-1.5">${ic('checkCircle', 'w-3.5 h-3.5 text-moss')} This homework has been graded${typeof sub.grade === 'number' ? ` — <span class="font-mono2 font-semibold text-ink">${sub.grade}/100</span>` : ''}. It's now view-only.</p>
            ` : `
              <p class="text-xs text-graphite hidden sm:block">${isCode ? 'Tab inserts spaces · preview updates as you type' : isMcq ? 'Answer every question · graded instantly on submit' : 'Autosaves locally as you type'}</p>
              <button id="submit-homework" class="btn-press px-6 py-3 rounded-full font-semibold text-sm text-paper bg-ink hover:bg-[#2a221a] transition-colors duration-300 flex items-center justify-center gap-2 ml-auto shadow-lg shadow-black/15">
                ${ic('sendHorizontal', 'w-4 h-4')} ${isMcq ? 'Submit Quiz' : 'Turn In Homework'}
              </button>
            `}
          </div>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(wrapper);

  requestAnimationFrame(() => {
    document.getElementById('workspace-overlay').classList.add('open');
    document.getElementById('workspace-panel').classList.add('open');
  });

  // ---- Tap-reliable buttons for the header row ----
  // A normal 'click' only fires after touchstart AND touchend land on the
  // same element. Tapping a header button while the textarea still has
  // focus also blurs it, which collapses the on-screen keyboard — and that
  // collapse resizes the page between touchstart and touchend, so the
  // button ends up somewhere else under your finger by the time you lift
  // it. The click gets silently dropped even though the button visibly
  // showed a pressed state. Firing on 'pointerdown' instead (which lands
  // before any of that reflow happens) fixes it, while still falling back
  // to 'click' for keyboard/screen-reader activation, which never fires
  // pointerdown at all.
  const bindTapReliable = (el, handler) => {
    if (!el) return;
    let firedViaPointer = false;
    el.addEventListener('pointerdown', (e) => {
      if (e.button !== undefined && e.button > 0) return; // ignore right/middle click
      firedViaPointer = true;
      handler(e);
    });
    el.addEventListener('click', (e) => {
      if (firedViaPointer) { firedViaPointer = false; return; }
      handler(e);
    });
  };

  bindTapReliable(document.getElementById('close-workspace'), closeWorkspace);
  document.getElementById('workspace-overlay').addEventListener('click', closeWorkspace);

  // Fullscreen toggle — a custom in-app "immersive mode" (not the browser's
  // native Fullscreen API, which shows its own system bar/instructions and
  // feels out of place). Hides the browser-chrome-y bits, expands the panel
  // full-width, and restyles the header dark. Exits via the button or the
  // phone's back gesture/button (we push a history entry for that).
  const workspacePanel = document.getElementById('workspace-panel');
  const fsBtn = document.getElementById('fullscreen-toggle');
  bindTapReliable(fsBtn, () => {
    if (workspacePanel.classList.contains('fs-mode')) history.back();
    else {
      workspacePanel.classList.add('fs-mode');
      setFsIconGlobal(true);
      fsModePanelId = 'workspace-panel';
      history.pushState({ nimbusFsMode: true }, '');
    }
  });

  const inputEl = isCode ? document.getElementById('code-input') : isMcq ? null : document.getElementById('notebook-input');

  if (isCode) {
    const frame = document.getElementById('preview-frame');
    let debounceTimer = null;
    let previewBlobUrl = null;
    const refreshPreview = () => {
      const doc = buildPreviewDoc(assignment.codeLang, inputEl.value);
      // srcdoc silently fails to render (or shows blank) for large documents in
      // some Android WebViews — a Blob URL is far more reliable at any size and
      // matches the behavior already proven to work via "Open in Browser".
      const nextUrl = URL.createObjectURL(new Blob([doc], { type: 'text/html' }));
      frame.src = nextUrl;
      const staleUrl = previewBlobUrl;
      previewBlobUrl = nextUrl;
      if (staleUrl) setTimeout(() => URL.revokeObjectURL(staleUrl), 1000);
    };
    refreshPreview();
    inputEl.addEventListener('input', () => {
      // Skip while an IME composition is active (Android composes almost
      // every word you type, one letter at a time, before committing it).
      // Reloading the preview iframe mid-word is a much bigger DOM/layout
      // disruption than anything else on this page touches during typing,
      // and it's exactly the kind of thing that knocks the keyboard's
      // composing range out of sync with the real caret — new letters then
      // land wherever the drifted position actually is, not where the
      // visible cursor appears. compositionend below picks this back up.
      if (isComposing) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(refreshPreview, 400);
    });
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = inputEl.selectionStart, end = inputEl.selectionEnd;
        inputEl.value = inputEl.value.slice(0, start) + '  ' + inputEl.value.slice(end);
        inputEl.selectionStart = inputEl.selectionEnd = start + 2;
        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
      }
    });

    // ---- Live syntax highlighting + line-number gutter, synced to the textarea ----
    const codeGutter = document.getElementById('code-gutter');
    const codeHighlightPre = document.getElementById('code-highlight');
    const codeHighlightCode = document.getElementById('code-highlight-code');
    const prismLang = prismLangFor(assignment.codeLang);
    // Above this size, skip live syntax highlighting/gutter rebuilds on every
    // keystroke — re-tokenizing a huge document synchronously on the main
    // thread (e.g. right after a "select all" + delete/paste) is what was
    // freezing/crashing the page on lower-end phones.
    const HEAVY_DOC_CHARS = 20000;
    const MAX_GUTTER_LINES = 4000;

    const updateGutter = () => {
      try {
        const lines = inputEl.value.split('\n').length;
        if (codeGutter.dataset.lines != lines) {
          codeGutter.dataset.lines = lines;
          const cap = Math.min(lines, MAX_GUTTER_LINES);
          let html = '';
          for (let i = 1; i <= cap; i++) html += `<div>${i}</div>`;
          codeGutter.innerHTML = html;
        }
      } catch (err) {}
    };
    const setRawOverlayText = () => {
      // Cheap, never skipped: just mirrors the real (invisible) text so the
      // overlay can never fall out of sync with where the caret actually is.
      try { codeHighlightCode.textContent = inputEl.value; } catch (err) {}
    };
    // ---- Give every distinct tag name its own consistent color ----
    // A plain Prism theme colors ALL tags the same shade, which makes deeply
    // nested markup hard to scan. Instead, each tag name (html, div, title,
    // custom-element, ...) gets its own color from a fixed palette, chosen
    // deterministically from the name so <div> is always the same color
    // everywhere, and a tag's closing partner (</div>) automatically matches
    // its opener since they hash to the same name.
    const TAG_RAINBOW_PALETTE = [
      '#E7BEAC', '#ACD3E7', '#CEACE7', '#E7ACC9', '#ACE7B6', '#E7D8AC',
      '#ACC0E7', '#E7C5AC', '#ACE7D8', '#E7ACC0', '#C9E7AC', '#ACB1E7',
      '#E7E2AC', '#D8ACE7'
    ];
    const colorForTagName = (name) => {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) | 0;
      return TAG_RAINBOW_PALETTE[Math.abs(hash) % TAG_RAINBOW_PALETTE.length];
    };
    const colorizeTagNames = () => {
      try {
        const selStart = inputEl.selectionStart;
        // Map every text node in the overlay to its character offset range,
        // so we can tell whether the cursor currently sits inside a given
        // tag-name span. Needed because a tag being actively typed (e.g.
        // "<t>" growing into "<ti>") would otherwise get a brand new color
        // every keystroke — each partial string hashes differently — which
        // flickers distractingly until the name is finished. Skipping the
        // still-being-typed tag (leaving it the plain fallback color) and
        // only assigning its real color once the cursor has moved on fixes
        // that without losing per-tag coloring elsewhere.
        const offsets = new Map();
        let total = 0;
        const docWalker = document.createTreeWalker(codeHighlightCode, NodeFilter.SHOW_TEXT);
        let textNode;
        while ((textNode = docWalker.nextNode())) {
          offsets.set(textNode, { start: total, end: total + textNode.nodeValue.length });
          total += textNode.nodeValue.length;
        }
        const rangeOf = (el) => {
          let start = Infinity, end = -Infinity;
          const w = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
          let n;
          while ((n = w.nextNode())) {
            const r = offsets.get(n);
            if (r) { start = Math.min(start, r.start); end = Math.max(end, r.end); }
          }
          return start <= end ? { start, end } : null;
        };
        const nodes = codeHighlightCode.querySelectorAll('.token.tag');
        for (const el of nodes) {
          // Prism nests a "tag" token (just "<name" or "</name") directly
          // inside the outer "tag" token (the whole "<name attr=...>" span).
          // Only that inner leaf's direct parent also carries the "tag"
          // class, which is how we single it out from the outer wrapper
          // without depending on exact selector nesting depth.
          if (!(el.parentElement && el.parentElement.classList.contains('tag'))) continue;
          const name = el.textContent.replace(/^<\/?/, '').trim().toLowerCase();
          if (!name) continue;
          const range = rangeOf(el);
          const stillTyping = range && selStart != null && selStart >= range.start && selStart <= range.end + 1;
          if (stillTyping) continue;
          el.style.color = colorForTagName(name);
        }
      } catch (err) {}
    };
    const runPrismHighlight = () => {
      // The expensive part. Re-tokenizing is slower on incomplete/tag-heavy
      // markup (e.g. mid-way through typing "<title>") and scales badly on
      // large pastes. Running this synchronously on every keystroke is what
      // was desyncing the caret from the colorized text while typing, and
      // fully freezing the page right after a big paste — so it's deferred
      // and debounced instead of running inline with input.
      try {
        if (inputEl.value.length <= HEAVY_DOC_CHARS && window.Prism && Prism.languages[prismLang]) {
          Prism.highlightElement(codeHighlightCode);
          colorizeTagNames();
        }
      } catch (err) {}
    };
    let syncRaf = null;
    let highlightTimer = null;
    const syncCodeVisuals = () => {
      // Skip entirely while an IME composition is active (e.g. Gboard still
      // resolving a word like "title" before you've committed it). The
      // overlay is already hidden during composition via .is-hidden-composing,
      // so there's nothing to gain by touching it — and mutating this DOM
      // while Android is mid-composition is exactly what was knocking the
      // keyboard's internal composing range out of sync with the real caret,
      // making later keystrokes land at a different spot than the visible
      // cursor. compositionend (below) explicitly resyncs once composition
      // finishes, so nothing is lost by skipping here.
      if (isComposing) return;
      // The overlay's text is what the user actually sees while typing (the
      // real textarea text is transparent), so it must never lag behind a
      // keystroke — update it immediately and cheaply, with no tokenizing.
      setRawOverlayText();
      if (syncRaf) cancelAnimationFrame(syncRaf);
      syncRaf = requestAnimationFrame(() => { syncRaf = null; updateGutter(); });
      clearTimeout(highlightTimer);
      highlightTimer = setTimeout(runPrismHighlight, 60);
    };
    updateGutter(); setRawOverlayText(); runPrismHighlight();
    inputEl.addEventListener('input', syncCodeVisuals);
    inputEl.addEventListener('scroll', () => {
      codeHighlightPre.scrollTop = inputEl.scrollTop;
      codeHighlightPre.scrollLeft = inputEl.scrollLeft;
      codeGutter.scrollTop = inputEl.scrollTop;
    });

    // ---- Keep the visible caret glued to the visible text while an IME is
    // composing (e.g. Gboard's word-suggestion bar) ----
    // While a soft keyboard is mid-composition, the browser draws its own
    // caret/underline for the not-yet-committed word using the textarea's
    // OWN text rendering — but our textarea text is invisible (color:
    // transparent) so the highlighted overlay can show through. That mismatch
    // is what makes the caret look like it's sitting ahead of the colored
    // text during composition. Simplest fix: make the real text momentarily
    // visible (and hide the overlay) for the duration of the composition, so
    // there's only ever one thing on screen and it can't drift.
    let isComposing = false;
    inputEl.addEventListener('compositionstart', () => {
      isComposing = true;
      inputEl.classList.add('is-composing');
      codeHighlightPre.classList.add('is-hidden-composing');
    });
    inputEl.addEventListener('compositionend', () => {
      isComposing = false;
      inputEl.classList.remove('is-composing');
      codeHighlightPre.classList.remove('is-hidden-composing');
      syncCodeVisuals();
      ensureCaretVisible();
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(refreshPreview, 400);
    });

    // ---- Keep the caret visible while typing near the bottom edge ----
    // Some mobile WebViews don't reliably auto-scroll a focused textarea's
    // caret into view once the on-screen keyboard shrinks the layout, so
    // text typed near the bottom can end up hidden until something (like
    // pressing Enter) forces a reflow. Since the editor uses wrap="off",
    // every line is exactly one row tall, so we can do this precisely
    // without a mirror-element measurement.
    const ensureCaretVisible = () => {
      if (document.activeElement !== inputEl) return;
      if (isComposing) return;
      const style = getComputedStyle(inputEl);
      const lineHeight = parseFloat(style.lineHeight) || 20;
      const paddingTop = parseFloat(style.paddingTop) || 0;
      const paddingBottom = parseFloat(style.paddingBottom) || 0;
      const caretLine = inputEl.value.slice(0, inputEl.selectionEnd).split('\n').length;
      const caretTop = paddingTop + (caretLine - 1) * lineHeight;
      const caretBottom = caretTop + lineHeight;
      const visibleTop = inputEl.scrollTop;
      const visibleBottom = visibleTop + inputEl.clientHeight - paddingBottom;
      if (caretTop < visibleTop) inputEl.scrollTop = caretTop;
      else if (caretBottom > visibleBottom) inputEl.scrollTop = caretBottom - inputEl.clientHeight + paddingBottom;
    };
    inputEl.addEventListener('input', ensureCaretVisible);
    inputEl.addEventListener('keyup', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Home', 'End', 'PageUp', 'PageDown', 'Enter'].includes(e.key)) ensureCaretVisible();
    });
    inputEl.addEventListener('click', ensureCaretVisible);
    inputEl.addEventListener('focus', () => setTimeout(ensureCaretVisible, 50));
    if (window.visualViewport) {
      const onViewportChange = () => { if (document.activeElement === inputEl) setTimeout(ensureCaretVisible, 60); };
      window.visualViewport.addEventListener('resize', onViewportChange);
      window.visualViewport.addEventListener('scroll', onViewportChange);
    }

    // ---- Mobile Ctrl/Alt toolbar: gives touch keyboards the shortcuts a
    // physical keyboard would have, plus quick-insert symbol keys. ----
    const mckToolbar = document.getElementById('mobile-code-toolbar');
    if (mckToolbar) {
      let mckCtrl = false, mckAlt = false;
      const mckCtrlBtn = document.getElementById('mck-ctrl');
      const mckAltBtn = document.getElementById('mck-alt');
      const mckTabBtn = document.getElementById('mck-tab');

      const mckSetCtrl = (val) => { mckCtrl = val; mckCtrlBtn.classList.toggle('active', val); };
      const mckSetAlt = (val) => { mckAlt = val; mckAltBtn.classList.toggle('active', val); };

      const fireInput = () => inputEl.dispatchEvent(new Event('input', { bubbles: true }));

      const insertAtCursor = (text, cursorOffset) => {
        const start = inputEl.selectionStart, end = inputEl.selectionEnd;
        inputEl.value = inputEl.value.slice(0, start) + text + inputEl.value.slice(end);
        const pos = start + (cursorOffset !== undefined ? cursorOffset : text.length);
        inputEl.selectionStart = inputEl.selectionEnd = pos;
        fireInput();
      };

      const PAIR_OPEN = { '{': '}', '[': ']', '(': ')', '<': '>', '"': '"', "'": "'" };
      const PAIR_CLOSE_OF = { '}': '{', ']': '[', ')': '(', '>': '<' };

      const runCtrlShortcut = (key) => {
        const k = key.toLowerCase();
        if (k === 'a') { inputEl.select(); }
        else if (k === 'c') {
          const sel = inputEl.value.slice(inputEl.selectionStart, inputEl.selectionEnd);
          if (sel && navigator.clipboard) navigator.clipboard.writeText(sel).catch(() => {});
        } else if (k === 'x') {
          const s = inputEl.selectionStart, e2 = inputEl.selectionEnd;
          const sel = inputEl.value.slice(s, e2);
          if (sel) {
            if (navigator.clipboard) navigator.clipboard.writeText(sel).catch(() => {});
            inputEl.value = inputEl.value.slice(0, s) + inputEl.value.slice(e2);
            inputEl.selectionStart = inputEl.selectionEnd = s;
            fireInput();
          }
        } else if (k === 'v') {
          if (navigator.clipboard && navigator.clipboard.readText) {
            navigator.clipboard.readText().then(text => { if (text) insertAtCursor(text); }).catch(() => showToast('Long-press the editor to paste.'));
          } else showToast('Long-press the editor to paste.');
        } else if (k === 'z') { try { document.execCommand('undo'); } catch (err) {} }
        else if (k === 'y') { try { document.execCommand('redo'); } catch (err) {} }
        else if (k === 'home') { inputEl.selectionStart = inputEl.selectionEnd = 0; }
        else if (k === 'end') { inputEl.selectionStart = inputEl.selectionEnd = inputEl.value.length; }
      };

      mckToolbar.querySelectorAll('.mck-key').forEach(btn => {
        // Prevent the button from stealing focus, which would dismiss the
        // on-screen keyboard before the tap can act on the textarea.
        btn.addEventListener('pointerdown', (e) => e.preventDefault());
      });

      mckToolbar.querySelectorAll('[data-mck-ins]').forEach(btn => {
        btn.addEventListener('click', () => {
          inputEl.focus();
          const ch = btn.dataset.mckIns;
          const start = inputEl.selectionStart, end = inputEl.selectionEnd;
          if (PAIR_OPEN[ch] && start === end) insertAtCursor(ch + PAIR_OPEN[ch], 1);
          else if (PAIR_CLOSE_OF[ch] && start === end && inputEl.value[start] === ch) inputEl.selectionStart = inputEl.selectionEnd = start + 1;
          else insertAtCursor(ch);
        });
      });

      mckCtrlBtn.addEventListener('click', () => { inputEl.focus(); mckSetCtrl(!mckCtrl); if (mckCtrl) mckSetAlt(false); });
      mckAltBtn.addEventListener('click', () => { inputEl.focus(); mckSetAlt(!mckAlt); if (mckAlt) mckSetCtrl(false); });
      mckTabBtn.addEventListener('click', () => { inputEl.focus(); insertAtCursor('  '); });

      mckToolbar.querySelectorAll('[data-mck-move]').forEach(btn => {
        btn.addEventListener('click', () => {
          inputEl.focus();
          const move = btn.dataset.mckMove;
          const val = inputEl.value;
          let pos = inputEl.selectionStart;
          if (mckCtrl && (move === 'home' || move === 'end')) {
            runCtrlShortcut(move);
          } else if (move === 'home') {
            inputEl.selectionStart = inputEl.selectionEnd = val.lastIndexOf('\n', pos - 1) + 1;
          } else if (move === 'end') {
            let lineEnd = val.indexOf('\n', pos);
            inputEl.selectionStart = inputEl.selectionEnd = lineEnd === -1 ? val.length : lineEnd;
          } else if (move === 'left' || move === 'right') {
            const dir = move === 'left' ? -1 : 1;
            if (mckAlt) {
              let i = pos;
              if (dir === -1) { while (i > 0 && /\s/.test(val[i - 1])) i--; while (i > 0 && !/\s/.test(val[i - 1])) i--; }
              else { while (i < val.length && /\s/.test(val[i])) i++; while (i < val.length && !/\s/.test(val[i])) i++; }
              pos = i;
            } else pos = Math.max(0, Math.min(val.length, pos + dir));
            inputEl.selectionStart = inputEl.selectionEnd = pos;
          } else if (move === 'up' || move === 'down') {
            const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
            const col = pos - lineStart;
            if (move === 'up') {
              if (lineStart === 0) pos = 0;
              else {
                const prevLineStart = val.lastIndexOf('\n', lineStart - 2) + 1;
                pos = prevLineStart + Math.min(col, lineStart - 1 - prevLineStart);
              }
            } else {
              const lineEnd = val.indexOf('\n', pos);
              if (lineEnd === -1) pos = val.length;
              else {
                const nextStart = lineEnd + 1;
                let nextEnd = val.indexOf('\n', nextStart);
                if (nextEnd === -1) nextEnd = val.length;
                pos = nextStart + Math.min(col, nextEnd - nextStart);
              }
            }
            inputEl.selectionStart = inputEl.selectionEnd = pos;
          }
          inputEl.focus();
          if (mckCtrl) mckSetCtrl(false);
          if (mckAlt) mckSetAlt(false);
        });
      });

      // Android/iOS soft keyboards insert text via IME composition and mostly
      // do NOT fire usable keydown events for letters — 'beforeinput' is what
      // actually fires reliably for on-screen keyboards, so we intercept the
      // character there instead of trying to read keydown.
      inputEl.addEventListener('beforeinput', (e) => {
        if (!mckCtrl) return;
        if (e.inputType === 'insertText' && e.data && e.data.length === 1) {
          e.preventDefault();
          runCtrlShortcut(e.data);
          // Keep Ctrl-mode active after "select all" so the very next tap
          // (typically C or X) still lands as a shortcut instead of typing
          // over the freshly-made selection.
          if (e.data.toLowerCase() !== 'a') mckSetCtrl(false);
        }
      });

      // Real hardware/Bluetooth keyboards do fire proper keydown — keep this
      // as a fallback path for those, without double-handling soft-keyboard input.
      inputEl.addEventListener('keydown', (e) => {
        if (mckCtrl && e.key && e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey && !e.isComposing) {
          e.preventDefault();
          runCtrlShortcut(e.key);
          if (e.key.toLowerCase() !== 'a') mckSetCtrl(false);
        }
      });
    }

    // ---- 3-dot "more" menu: Add from Files + Open in Browser ----
    const moreBtn = document.getElementById('workspace-more-btn');
    const moreMenu = document.getElementById('workspace-more-menu');
    if (moreBtn && moreMenu) {
      const closeMoreMenu = () => moreMenu.classList.add('hidden-menu');
      const openMoreMenu = () => moreMenu.classList.remove('hidden-menu');
      moreBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        moreMenu.classList.contains('hidden-menu') ? openMoreMenu() : closeMoreMenu();
      });
      document.addEventListener('click', (e) => {
        if (!moreMenu.classList.contains('hidden-menu') && !moreMenu.contains(e.target) && e.target !== moreBtn) closeMoreMenu();
      });

      // Add from Files — only accepts .html/.htm/.css/.js, inserts the text at the cursor
      const fileInput = document.getElementById('mck-file-input');
      const addFileBtn = document.getElementById('mck-add-file');
      if (fileInput && addFileBtn) {
        addFileBtn.addEventListener('click', () => { closeMoreMenu(); fileInput.click(); });
        fileInput.addEventListener('change', () => {
          const file = fileInput.files && fileInput.files[0];
          fileInput.value = '';
          if (!file) return;
          const ext = (file.name.split('.').pop() || '').toLowerCase();
          if (!['html', 'htm', 'css', 'js'].includes(ext)) {
            showToast('Only .html, .css or .js files can be added.');
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            const text = typeof reader.result === 'string' ? reader.result : '';
            inputEl.focus();
            const start = inputEl.selectionStart, end = inputEl.selectionEnd;
            inputEl.value = inputEl.value.slice(0, start) + text + inputEl.value.slice(end);
            inputEl.selectionStart = inputEl.selectionEnd = start + text.length;
            inputEl.dispatchEvent(new Event('input', { bubbles: true }));
            showToast('Added ' + file.name + ' to the editor.');
          };
          reader.onerror = () => showToast('Could not read that file.');
          reader.readAsText(file);
        });
      }

      // Open in Browser — spins up a blob-URL page from the current code and
      // opens it in a real browser tab (the closest a sandboxed web app can
      // get to launching an actual localhost preview in Chrome).
      const openBrowserBtn = document.getElementById('mck-open-browser');
      if (openBrowserBtn) {
        openBrowserBtn.addEventListener('click', () => {
          closeMoreMenu();
          const doc = buildPreviewDoc(assignment.codeLang, inputEl.value);
          const blob = new Blob([doc], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          const win = window.open(url, '_blank');
          if (!win) showToast('Allow pop-ups to open this in your browser.');
          else setTimeout(() => URL.revokeObjectURL(url), 60000);
        });
      }
    }

    const previewPaneEl = document.getElementById('editor-pane-preview');
    const setEditorView = (mode, opts) => {
      editorPreviewMode = mode;
      wrapper.querySelectorAll('[data-editor-view]').forEach(b => b.classList.toggle('active', b.dataset.editorView === mode));
      previewPaneEl.style.transition = (opts && opts.instant) ? 'none' : 'transform 0.28s cubic-bezier(0.22,1,0.36,1)';
      previewPaneEl.style.transform = mode === 'preview' ? 'translateX(0)' : 'translateX(100%)';
      previewPaneEl.style.pointerEvents = mode === 'preview' ? 'auto' : 'none';
      const mckBar = document.getElementById('mobile-code-toolbar');
      if (mckBar) mckBar.classList.toggle('hidden', mode !== 'code');
      const previewBtn = document.getElementById('preview-toggle-mobile');
      if (previewBtn) previewBtn.innerHTML = ic(mode === 'preview' ? 'code' : 'eyePreview', 'w-4 h-4');
      if (mode === 'preview') refreshPreview();
    };

    wrapper.querySelectorAll('[data-editor-view]').forEach(btn => {
      btn.addEventListener('click', () => setEditorView(btn.dataset.editorView));
    });

    const previewToggleBtn = document.getElementById('preview-toggle-mobile');
    if (previewToggleBtn) previewToggleBtn.addEventListener('click', () => setEditorView(editorPreviewMode === 'preview' ? 'code' : 'preview'));

    // Swipe left/right across the editor to drag the Preview pane in like a
    // drawer — it tracks the finger live instead of snapping open on release.
    // Handy in fullscreen where there's no room for a persistent toggle.
    const panesWrap = document.getElementById('editor-panes-wrap');
    let swipeStartX = null, swipeStartY = null, swiping = false, swipeDeciding = false, wrapWidth = 0;
    let startedInTextarea = false, textareaAtRightEdge = true, textareaAtLeftEdge = true;

    const abortSwipeGesture = () => {
      swipeStartX = null; swipeStartY = null; swiping = false; swipeDeciding = false;
    };

    panesWrap.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) { abortSwipeGesture(); return; }
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
      swiping = false;
      swipeDeciding = true;
      wrapWidth = panesWrap.clientWidth;
      const codeInputEl = document.getElementById('code-input');
      startedInTextarea = !!(codeInputEl && e.target && codeInputEl.contains(e.target));
      textareaAtRightEdge = codeInputEl ? (codeInputEl.scrollLeft + codeInputEl.clientWidth >= codeInputEl.scrollWidth - 2) : true;
      textareaAtLeftEdge = codeInputEl ? (codeInputEl.scrollLeft <= 2) : true;
    }, { passive: true });

    panesWrap.addEventListener('touchmove', (e) => {
      if (swipeStartX === null) return;
      const touch = e.touches[0];
      const dx = touch.clientX - swipeStartX;
      const dy = touch.clientY - swipeStartY;

      if (swipeDeciding) {
        if (Math.abs(dy) > 12 && Math.abs(dy) >= Math.abs(dx)) { abortSwipeGesture(); return; }
        if (Math.abs(dx) < 12) return;
        // If the drag started inside the code textarea, let it scroll the
        // code horizontally first — only take over once it's already at the
        // scroll edge in that direction, so scrolling long lines never gets
        // mistaken for a page swipe.
        if (startedInTextarea) {
          if (editorPreviewMode === 'code' && dx < 0 && !textareaAtRightEdge) return;
          if (editorPreviewMode === 'preview' && dx > 0 && !textareaAtLeftEdge) return;
        }
        swiping = true;
        swipeDeciding = false;
      }
      if (!swiping) return;
      e.preventDefault();
      const base = editorPreviewMode === 'preview' ? 0 : wrapWidth;
      const x = Math.max(0, Math.min(wrapWidth, base + dx));
      previewPaneEl.style.transition = 'none';
      previewPaneEl.style.transform = `translateX(${x}px)`;
      previewPaneEl.style.pointerEvents = 'auto';
    }, { passive: false });

    panesWrap.addEventListener('touchend', (e) => {
      if (swipeStartX === null) return;
      const wasSwiping = swiping;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - swipeStartX;
      abortSwipeGesture();
      if (!wasSwiping) return;
      const base = editorPreviewMode === 'preview' ? 0 : wrapWidth;
      const current = Math.max(0, Math.min(wrapWidth, base + dx));
      const openThreshold = wrapWidth * 0.35;
      if (editorPreviewMode === 'code') {
        setEditorView(current < wrapWidth - openThreshold ? 'preview' : 'code');
      } else {
        setEditorView(current > openThreshold ? 'code' : 'preview');
      }
    }, { passive: true });

    panesWrap.addEventListener('touchcancel', () => {
      abortSwipeGesture();
      setEditorView(editorPreviewMode);
    }, { passive: true });
  }

  const submitBtn = document.getElementById('submit-homework');
  if (submitBtn) submitBtn.addEventListener('click', () => {
    if (workspacePanel.classList.contains('fs-mode')) { showToast('Exit fullscreen to turn in your homework.'); return; }

    if (isMcq) {
      const questions = assignment.mcqQuestions || [];
      const answers = [];
      let firstUnanswered = -1;
      questions.forEach((q, qi) => {
        const checked = wrapper.querySelector(`input[name="mcq-q-${qi}"]:checked`);
        answers.push(checked ? parseInt(checked.value, 10) : null);
        if (!checked && firstUnanswered === -1) firstUnanswered = qi;
      });
      if (firstUnanswered !== -1) {
        showToast('Answer every question before submitting.');
        const qEl = wrapper.querySelector(`[data-mcq-q="${firstUnanswered}"]`);
        if (qEl) qEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
      const correctCount = questions.filter((q, qi) => answers[qi] === q.correct).length;
      const grade = questions.length ? Math.round((correctCount / questions.length) * 100) : 0;
      upsertSubmission(id, studentId, {
        content: JSON.stringify(answers), status: 'checked', grade,
        remark: `Auto-graded: ${correctCount}/${questions.length} correct.`,
        submittedAt: Date.now(), checkedAt: Date.now()
      });
      showToast(`Quiz submitted — scored ${correctCount}/${questions.length}!`);
      mountWorkspace(id);
      return;
    }

    const text = inputEl.value.trim();
    if (!text) {
      inputEl.classList.add('ring-2', 'ring-redline/40', 'rounded-2xl');
      inputEl.placeholder = "Write something before turning it in...";
      setTimeout(() => inputEl.classList.remove('ring-2', 'ring-redline/40', 'rounded-2xl'), 900);
      return;
    }
    upsertSubmission(id, studentId, { content: inputEl.value, status: 'submitted', submittedAt: Date.now(), remark: null });
    showToast('Homework turned in!');
    closeWorkspace();
    setTimeout(() => render(), 380);
  });
}

function closeWorkspace() {
  const overlay = document.getElementById('workspace-overlay');
  const panel = document.getElementById('workspace-panel');
  if (panel && panel.classList.contains('fs-mode')) { panel.classList.remove('fs-mode'); fsModePanelId = null; }
  if (overlay) overlay.classList.remove('open');
  if (panel) panel.classList.remove('open');
  activeWorkspaceId = null;
  setTimeout(() => { const el = document.getElementById('workspace-root'); if (el) el.remove(); }, 460);
}

// ============================================================
// EVENT BINDING
// ============================================================
// ---------- "HTML WORKSPACE" — standalone live code editor for Create Homework ----------
// Deliberately its own instance (own ids, own event wiring) rather than sharing
// state with the student workspace editor above — see the CSS comment on
// #hw-workspace-shell. Re-run every time bindEvents() runs (i.e. after every
// render()), which is safe because it only ever attaches to freshly-rendered
// elements found by id.
function wireHwCodeEditor() {
  const inputEl = document.getElementById('hw-starter');
  const gutterEl = document.getElementById('hw-code-gutter');
  const highlightPreEl = document.getElementById('hw-code-highlight');
  const highlightCodeEl = document.getElementById('hw-code-highlight-code');
  const toolbarEl = document.getElementById('hw-code-toolbar');
  const filenameEl = document.getElementById('hw-workspace-filename');
  const langBadgeEl = document.getElementById('hw-workspace-lang-badge');
  if (!inputEl || !gutterEl || !highlightPreEl || !highlightCodeEl) return;

  const HEAVY_DOC_CHARS = 20000;
  const MAX_GUTTER_LINES = 4000;
  const VOID_TAGS = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
  const currentLang = () => (document.getElementById('hw-lang')?.value || 'html');
  const fireInput = () => inputEl.dispatchEvent(new Event('input', { bubbles: true }));

  const updateGutter = () => {
    try {
      const lines = inputEl.value.split('\n').length;
      if (gutterEl.dataset.lines != lines) {
        gutterEl.dataset.lines = lines;
        const cap = Math.min(lines, MAX_GUTTER_LINES);
        let html = '';
        for (let i = 1; i <= cap; i++) html += `<div>${i}</div>`;
        gutterEl.innerHTML = html;
      }
    } catch (err) {}
  };
  const setRawOverlayText = () => { try { highlightCodeEl.textContent = inputEl.value; } catch (err) {} };
  const runHighlight = () => {
    try {
      const lang = prismLangFor(currentLang());
      highlightCodeEl.className = 'language-' + lang;
      if (inputEl.value.length <= HEAVY_DOC_CHARS && window.Prism && Prism.languages[lang]) {
        Prism.highlightElement(highlightCodeEl);
      }
    } catch (err) {}
  };

  let syncRaf = null, highlightTimer = null, isComposing = false;
  const syncVisuals = () => {
    if (isComposing) return;
    setRawOverlayText();
    if (syncRaf) cancelAnimationFrame(syncRaf);
    syncRaf = requestAnimationFrame(() => { syncRaf = null; updateGutter(); });
    clearTimeout(highlightTimer);
    highlightTimer = setTimeout(runHighlight, 60);
  };
  updateGutter(); setRawOverlayText(); runHighlight();

  inputEl.addEventListener('input', syncVisuals);
  inputEl.addEventListener('scroll', () => {
    highlightPreEl.scrollTop = inputEl.scrollTop;
    highlightPreEl.scrollLeft = inputEl.scrollLeft;
    gutterEl.scrollTop = inputEl.scrollTop;
  });

  const ensureCaretVisible = () => {
    if (document.activeElement !== inputEl || isComposing) return;
    const style = getComputedStyle(inputEl);
    const lineHeight = parseFloat(style.lineHeight) || 20;
    const paddingTop = parseFloat(style.paddingTop) || 0;
    const paddingBottom = parseFloat(style.paddingBottom) || 0;
    const caretLine = inputEl.value.slice(0, inputEl.selectionEnd).split('\n').length;
    const caretTop = paddingTop + (caretLine - 1) * lineHeight;
    const caretBottom = caretTop + lineHeight;
    const visibleTop = inputEl.scrollTop;
    const visibleBottom = visibleTop + inputEl.clientHeight - paddingBottom;
    if (caretTop < visibleTop) inputEl.scrollTop = caretTop;
    else if (caretBottom > visibleBottom) inputEl.scrollTop = caretBottom - inputEl.clientHeight + paddingBottom;
  };
  inputEl.addEventListener('input', ensureCaretVisible);
  inputEl.addEventListener('keyup', (e) => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Home','End','PageUp','PageDown','Enter'].includes(e.key)) ensureCaretVisible();
  });
  inputEl.addEventListener('click', ensureCaretVisible);
  inputEl.addEventListener('focus', () => setTimeout(ensureCaretVisible, 50));

  // ---- IME composition safety (mirrors the student editor's approach) ----
  inputEl.addEventListener('compositionstart', () => {
    isComposing = true;
    inputEl.classList.add('is-composing');
    highlightPreEl.classList.add('is-hidden-composing');
  });
  inputEl.addEventListener('compositionend', () => {
    isComposing = false;
    inputEl.classList.remove('is-composing');
    highlightPreEl.classList.remove('is-hidden-composing');
    syncVisuals();
    ensureCaretVisible();
  });

  // ---- TAB to indent, and a "smart" Enter: stepping inside an opening tag or
  // brace indents one level, and if its matching close sits right after the
  // cursor, drops the close onto its own line and parks the cursor between. ----
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = inputEl.selectionStart, end = inputEl.selectionEnd;
      inputEl.value = inputEl.value.slice(0, start) + '  ' + inputEl.value.slice(end);
      inputEl.selectionStart = inputEl.selectionEnd = start + 2;
      fireInput();
      return;
    }
    if (e.key === 'Enter') {
      const val = inputEl.value;
      const start = inputEl.selectionStart, end = inputEl.selectionEnd;
      if (start !== end) return; // leave selection-replace to the browser's default
      e.preventDefault();
      const lineStart = val.lastIndexOf('\n', start - 1) + 1;
      const beforeCursor = val.slice(lineStart, start);
      const baseIndent = (beforeCursor.match(/^[ \t]*/) || [''])[0];
      const trimmed = beforeCursor.trim();

      const tagMatch = trimmed.match(/<\/?([a-zA-Z][a-zA-Z0-9-]*)[^<>]*?(\/)?>$/);
      const opensTag = !!(tagMatch && !trimmed.slice(trimmed.lastIndexOf('<')).startsWith('</') && !tagMatch[2] && !VOID_TAGS.has(tagMatch[1].toLowerCase()));
      const opensBrace = /[{(\[]$/.test(trimmed);

      const after = val.slice(start);
      let stepsInside = false;
      if (opensTag) stepsInside = new RegExp('^\\s*</' + tagMatch[1] + '\\s*>').test(after);
      else if (opensBrace) {
        const closerFor = { '{': '}', '(': ')', '[': ']' };
        stepsInside = new RegExp('^\\s*\\' + closerFor[trimmed.slice(-1)]).test(after);
      }

      let insert, caretOffset;
      if ((opensTag || opensBrace) && stepsInside) {
        const inner = baseIndent + '  ';
        insert = '\n' + inner + '\n' + baseIndent;
        caretOffset = 1 + inner.length;
      } else if (opensTag || opensBrace) {
        insert = '\n' + baseIndent + '  ';
        caretOffset = insert.length;
      } else {
        insert = '\n' + baseIndent;
        caretOffset = insert.length;
      }
      inputEl.value = val.slice(0, start) + insert + val.slice(end);
      inputEl.selectionStart = inputEl.selectionEnd = start + caretOffset;
      fireInput();
      ensureCaretVisible();
    }
  });

  // ---- Bottom toolbar: TAB / symbols / CTRL / SHIFT / arrows / undo / redo / find ----
  if (toolbarEl) {
    let hwCtrl = false, hwShift = false;
    const ctrlBtn = document.getElementById('hw-mck-ctrl');
    const shiftBtn = document.getElementById('hw-mck-shift');
    const tabBtn = document.getElementById('hw-mck-tab');
    const undoBtn = document.getElementById('hw-mck-undo');
    const redoBtn = document.getElementById('hw-mck-redo');
    const searchBtn = document.getElementById('hw-mck-search');
    const setCtrl = (v) => { hwCtrl = v; ctrlBtn.classList.toggle('active', v); };
    const setShift = (v) => { hwShift = v; shiftBtn.classList.toggle('active', v); };

    const insertAtCursor = (text, cursorOffset) => {
      const start = inputEl.selectionStart, end = inputEl.selectionEnd;
      inputEl.value = inputEl.value.slice(0, start) + text + inputEl.value.slice(end);
      inputEl.selectionStart = inputEl.selectionEnd = start + (cursorOffset !== undefined ? cursorOffset : text.length);
      fireInput();
    };
    const PAIR_OPEN = { '{': '}', '[': ']', '(': ')', '<': '>', '"': '"', "'": "'" };
    const PAIR_CLOSE_OF = { '}': '{', ']': '[', ')': '(', '>': '<' };

    toolbarEl.querySelectorAll('.mck-key').forEach(btn => btn.addEventListener('pointerdown', (e) => e.preventDefault()));
    toolbarEl.querySelectorAll('[data-hwmck-ins]').forEach(btn => {
      btn.addEventListener('click', () => {
        inputEl.focus();
        const ch = btn.dataset.hwmckIns;
        const start = inputEl.selectionStart, end = inputEl.selectionEnd;
        if (PAIR_OPEN[ch] && start === end) insertAtCursor(ch + PAIR_OPEN[ch], 1);
        else if (PAIR_CLOSE_OF[ch] && start === end && inputEl.value[start] === ch) inputEl.selectionStart = inputEl.selectionEnd = start + 1;
        else insertAtCursor(ch);
      });
    });
    tabBtn.addEventListener('click', () => { inputEl.focus(); insertAtCursor('  '); });
    ctrlBtn.addEventListener('click', () => { inputEl.focus(); setCtrl(!hwCtrl); });
    shiftBtn.addEventListener('click', () => { inputEl.focus(); setShift(!hwShift); });
    undoBtn.addEventListener('click', () => { inputEl.focus(); try { document.execCommand('undo'); } catch (err) {} syncVisuals(); });
    redoBtn.addEventListener('click', () => { inputEl.focus(); try { document.execCommand('redo'); } catch (err) {} syncVisuals(); });
    searchBtn.addEventListener('click', () => {
      const q = window.prompt('Find in editor:');
      if (!q) return;
      let idx = inputEl.value.indexOf(q, inputEl.selectionEnd || 0);
      if (idx === -1) idx = inputEl.value.indexOf(q);
      if (idx === -1) { showToast('Not found: ' + q); return; }
      inputEl.focus();
      inputEl.setSelectionRange(idx, idx + q.length);
      ensureCaretVisible();
    });

    const runCtrlShortcut = (key) => {
      const k = key.toLowerCase();
      if (k === 'a') inputEl.select();
      else if (k === 'c') {
        const sel = inputEl.value.slice(inputEl.selectionStart, inputEl.selectionEnd);
        if (sel && navigator.clipboard) navigator.clipboard.writeText(sel).catch(() => {});
      } else if (k === 'x') {
        const s = inputEl.selectionStart, e2 = inputEl.selectionEnd;
        const sel = inputEl.value.slice(s, e2);
        if (sel) {
          if (navigator.clipboard) navigator.clipboard.writeText(sel).catch(() => {});
          inputEl.value = inputEl.value.slice(0, s) + inputEl.value.slice(e2);
          inputEl.selectionStart = inputEl.selectionEnd = s;
          fireInput();
        }
      } else if (k === 'v') {
        if (navigator.clipboard && navigator.clipboard.readText) {
          navigator.clipboard.readText().then(text => { if (text) insertAtCursor(text); }).catch(() => showToast('Long-press the editor to paste.'));
        } else showToast('Long-press the editor to paste.');
      } else if (k === 'z') { try { document.execCommand('undo'); } catch (err) {} }
      else if (k === 'y') { try { document.execCommand('redo'); } catch (err) {} }
    };

    toolbarEl.querySelectorAll('[data-hwmck-move]').forEach(btn => {
      btn.addEventListener('click', () => {
        inputEl.focus();
        const move = btn.dataset.hwmckMove;
        const val = inputEl.value;
        const anchor = hwShift ? (inputEl.selectionDirection === 'backward' ? inputEl.selectionEnd : inputEl.selectionStart) : null;
        let pos = hwShift ? (inputEl.selectionDirection === 'backward' ? inputEl.selectionStart : inputEl.selectionEnd) : inputEl.selectionStart;
        if (move === 'home') pos = val.lastIndexOf('\n', pos - 1) + 1;
        else if (move === 'end') { const l = val.indexOf('\n', pos); pos = l === -1 ? val.length : l; }
        else if (move === 'left') pos = Math.max(0, pos - 1);
        else if (move === 'right') pos = Math.min(val.length, pos + 1);
        else if (move === 'up' || move === 'down') {
          const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
          const col = pos - lineStart;
          if (move === 'up') {
            if (lineStart === 0) pos = 0;
            else {
              const prevLineStart = val.lastIndexOf('\n', lineStart - 2) + 1;
              pos = prevLineStart + Math.min(col, lineStart - 1 - prevLineStart);
            }
          } else {
            const lineEnd = val.indexOf('\n', pos);
            if (lineEnd === -1) pos = val.length;
            else {
              const nextStart = lineEnd + 1;
              let nextEnd = val.indexOf('\n', nextStart);
              if (nextEnd === -1) nextEnd = val.length;
              pos = nextStart + Math.min(col, nextEnd - nextStart);
            }
          }
        }
        if (hwShift && anchor !== null) {
          const dir = pos < anchor ? 'backward' : 'forward';
          inputEl.setSelectionRange(Math.min(anchor, pos), Math.max(anchor, pos), dir);
        } else {
          inputEl.setSelectionRange(pos, pos);
        }
        inputEl.focus();
        ensureCaretVisible();
        if (hwCtrl) setCtrl(false);
      });
    });

    inputEl.addEventListener('beforeinput', (e) => {
      if (!hwCtrl) return;
      if (e.inputType === 'insertText' && e.data && e.data.length === 1) {
        e.preventDefault();
        runCtrlShortcut(e.data);
        if (e.data.toLowerCase() !== 'a') setCtrl(false);
      }
    });
    inputEl.addEventListener('keydown', (e) => {
      if (hwCtrl && e.key && e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey && !e.isComposing) {
        e.preventDefault();
        runCtrlShortcut(e.key);
        if (e.key.toLowerCase() !== 'a') setCtrl(false);
      }
    });
  }

  // ---- Keep the filename/badge + highlighting language in sync with the Language toggle ----
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.dataset.lang;
      if (filenameEl) filenameEl.textContent = 'untitled.' + lang;
      if (langBadgeEl) langBadgeEl.textContent = lang;
      runHighlight();
    });
  });
}

// Called after a successful Firebase "Continue with Google" popup.
// `user` is { uid, name, email, photoURL }.
function handleGoogleSignIn(user) {
  if (!user) return;

  if (user.uid === ADMIN_GOOGLE_UID) {
    setSession({ role: 'admin', id: ADMIN_ID, name: user.name || ADMIN_NAME });
    adminNav = 'dashboard';
    navigate('admin');
    return;
  }

  const students = getStudents();
  const existing = students.find(s => s.googleUid === user.uid);
  if (existing) {
    // Returning student who already has an ID + password on file — straight to dashboard.
    setSession({ role: 'learner', id: existing.id, name: existing.name });
    bannerDismissed = false;
    learnerNav = 'dashboard';
    navigate('learner');
    setTimeout(() => markAllSeen(existing.id), 3500);
    return;
  }

  // Brand new Google sign-in — hold onto their profile and ask them to pick
  // an ID + password before they see the dashboard.
  pendingGoogleUser = user;
  authMode = 'google-setup';
  navigate('login');
}

function bindEvents() {
  const toggleBtn = document.getElementById('toggle-password');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const pwInput = document.getElementById('login-password');
      const isPw = pwInput.type === 'password';
      pwInput.type = isPw ? 'text' : 'password';
      toggleBtn.innerHTML = isPw ? ic('eyeOff', 'w-4 h-4') : ic('eye', 'w-4 h-4');
    });
  }

  const backToLoginBtn = document.getElementById('back-to-login');
  if (backToLoginBtn) backToLoginBtn.addEventListener('click', () => {
    pendingGoogleUser = null;
    authMode = 'login';
    if (window.nimbusCloud) window.nimbusCloud.signOutGoogle();
    render();
  });

  const googleBtn = document.getElementById('google-signin-btn');
  if (googleBtn) {
    googleBtn.addEventListener('click', () => {
      if (!window.nimbusCloud) { showToast('Still connecting — try again in a second.'); return; }
      googleBtn.disabled = true;
      window.nimbusCloud.signInWithGoogle()
        .then(handleGoogleSignIn)
        .catch((err) => {
          console.error('Nimbus: Google sign-in failed', err);
          showToast('Google sign-in was cancelled or failed.');
        })
        .finally(() => { googleBtn.disabled = false; });
    });
  }

  const loginForm = document.getElementById('login-form');
  if (loginForm) {
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const uidRaw = document.getElementById('login-uid').value.trim();
      const pw = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const showError = (msg) => {
        errorEl.querySelector('span').textContent = msg;
        errorEl.classList.remove('hidden');
        errorEl.classList.add('flex');
      };

      if (!uidRaw) { showError('Enter an ID to continue.'); return; }

      if (uidRaw.toLowerCase() === ADMIN_ID) {
        if (pw !== ADMIN_PW) { showError('Incorrect password for admin.'); return; }
        errorEl.classList.add('hidden');
        setSession({ role: 'admin', id: ADMIN_ID, name: ADMIN_NAME });
        adminNav = 'dashboard';
        navigate('admin');
        return;
      }

      const student = findStudent(uidRaw);
      if (!student || student.password !== pw) { showError("No matching account. New students should use Continue with Google."); return; }
      errorEl.classList.add('hidden');
      setSession({ role: 'learner', id: student.id, name: student.name });
      bannerDismissed = false;
      learnerNav = 'dashboard';
      navigate('learner');
      setTimeout(() => markAllSeen(student.id), 3500);
    });

  const signupForm = document.getElementById('signup-form');
  if (signupForm) {
    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value.trim();

      const pw = document.getElementById('signup-password').value;
      const pw2 = document.getElementById('signup-password2').value;
      const errorEl = document.getElementById('signup-error');

        errorEl.querySelector('span').textContent = msg;

      if (!pendingGoogleUser) { showError("Something went wrong — please sign in with Google again."); return; }
      if (!name || !uidRaw || !pw || !pw2) { showError("Fill in every field to continue."); return; }
      const uid = uidRaw.toLowerCase().replace(/\s+/g, '');
      if (uid === ADMIN_ID) { showError("That ID is reserved. Pick another."); return; }
      if (findStudent(uid)) { showError("That ID is already taken. Pick another."); return; }

    }
    document.getElementById('hw-mcq-add')?.addEventListener('click', () => {

    });
    mcqContainer.addEventListener('click', (e) => {

      btn.closest('.mcq-row').remove();
    });
  }

  const createForm = document.getElementById('create-homework-form');
  if (createForm) {
    createForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const title = document.getElementById('hw-title').value.trim();
      const description = document.getElementById('hw-description').value.trim();
      const objectivesRaw = document.getElementById('hw-objectives').value.trim();
      const objectives = objectivesRaw ? objectivesRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];
      const format = document.getElementById('hw-format').value;
      const dueRaw = document.getElementById('hw-due').value;
      const dueAt = dueRaw ? new Date(dueRaw + 'T23:59:59').getTime() : null;
      if (!title || !description) return;

      let mcqQuestions = null;
      if (format === 'mcq') {
        mcqQuestions = [];
        const rows = document.querySelectorAll('#hw-mcq-questions .mcq-row');
        for (const row of rows) {
          const qText = row.querySelector('.mcq-q-text').value.trim();
          const optionEls = row.querySelectorAll('.mcq-opt-text');
          const options = Array.from(optionEls).map(el => el.value.trim());
          const correctEl = row.querySelector('.mcq-correct-radio:checked');
          if (!qText || options.some(o => !o) || !correctEl) {
            showToast('Each question needs text, 4 options, and a correct answer picked.');
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
          }
          mcqQuestions.push({ q: qText, options, correct: parseInt(correctEl.value, 10) });
        }
        if (mcqQuestions.length === 0) { showToast('Add at least one question.'); return; }
      }

      const list = getAssignments();

      if (editingAssignmentId) {
        const idx = list.findIndex(a => a.id === editingAssignmentId);
        if (idx > -1) {
          const patch = { title, description, objectives, type: format, dueAt };
          if (format === 'code') {
            patch.codeLang = document.getElementById('hw-lang').value;
            patch.starter = document.getElementById('hw-starter').value;
            patch.mcqQuestions = undefined;
          } else if (format === 'mcq') {
            patch.mcqQuestions = mcqQuestions;
            patch.codeLang = undefined;
            patch.starter = undefined;
          } else {
            patch.codeLang = undefined;
            patch.starter = undefined;
            patch.mcqQuestions = undefined;
          }
          list[idx] = Object.assign({}, list[idx], patch);
          saveAssignments(list);
          showToast('Homework updated!');
        }
        editingAssignmentId = null;
      } else {
        const newAssignment = { id: 'hw_' + Date.now(), title, description, objectives, type: format, dueAt, createdAt: Date.now() };
        if (format === 'code') {
          newAssignment.codeLang = document.getElementById('hw-lang').value;
          newAssignment.starter = document.getElementById('hw-starter').value;
        } else if (format === 'mcq') {
          newAssignment.mcqQuestions = mcqQuestions;
        }
        list.push(newAssignment);
        saveAssignments(list);
        showToast('Homework assigned to class!');

      createForm.reset();
      document.querySelectorAll('.format-btn').forEach(b => b.classList.toggle('active', b.dataset.format === 'written'));

  const lnChatForm = document.getElementById('ln-chat-form');
  if (lnChatForm) {
    lnChatForm.addEventListener('submit', (e) => {
      e.preventDefault();

      if (!text) return;
      const session = getSession();
      sendMessage(session.id, 'learner', text);

  }
  if (learnerNav === 'notification') {
    const session = getSession();
    if (session?.id) markThreadRead(session.id, 'learner');
    const scroller = document.getElementById('ln-chat-scroll');
    if (scroller) scroller.scrollTop = scroller.scrollHeight;
  }

  // Search / filter (direct DOM filtering — no re-render, so typing keeps focus)
  const taskSearch = document.getElementById('task-search');
  if (taskSearch) {
    taskSearch.addEventListener('input', () => {
      const q = taskSearch.value.trim().toLowerCase();
      document.querySelectorAll('.task-row').forEach(row => {
        row.classList.toggle('hidden', !!q && !row.dataset.taskTitle.includes(q));
      });
    });
  }
  const studentSearch = document.getElementById('student-search');
  if (studentSearch) {
    studentSearch.addEventListener('input', () => {
      const q = studentSearch.value.trim().toLowerCase();
      document.querySelectorAll('.student-row').forEach(row => {
        row.classList.toggle('hidden', !!q && !row.dataset.studentName.includes(q));
      });
    });
  }

  // Notifications toggle
  const notifyBtn = document.getElementById('notify-toggle-btn');
  if (notifyBtn) notifyBtn.addEventListener('click', () => {
    if (notificationsEnabled()) { showToast('Notifications are already on.'); return; }
    requestNotificationPermission();
  });

  // Install-to-home-screen
  const installBtn = document.getElementById('install-app-btn');
  if (installBtn) {
    if (deferredInstallPrompt) installBtn.classList.remove('hidden');
    installBtn.addEventListener('click', async () => {
      if (!deferredInstallPrompt) { showToast('Use your browser menu to Add to Home Screen.'); return; }
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installBtn.classList.add('hidden');
    });
  }

  // Backup / restore
  const exportBtn = document.getElementById('export-backup-btn');
  if (exportBtn) exportBtn.addEventListener('click', () => { exportBackup(); showToast('Backup downloaded!'); });
  const importBtn = document.getElementById('import-backup-btn');
  const importInput = document.getElementById('import-backup-input');
  if (importBtn && importInput) {
    importBtn.addEventListener('click', () => importInput.click());
    importInput.addEventListener('change', () => {
      const file = importInput.files && importInput.files[0];
      if (!file) return;
      showConfirm({
        title: 'Restore this backup?',
        message: 'This will overwrite all current data on this device — assignments, students, submissions, and messages.',
        confirmLabel: 'Restore',
        cancelLabel: 'Cancel',
        danger: true
      }).then(ok => { if (ok) importBackupFile(file); importInput.value = ''; });
    });
  }
}

// ============================================================
// CLOUD SYNC — mirrors Firestore into localStorage in real time so every
// getX() function above keeps working unchanged, but now reflects what's
// on the server rather than only what's on this device.
// ============================================================
let cloudBootstrapped = false;
function applyCloudData(data) {
  if (!data) return;
  const map = {
    assignments: STORAGE_KEYS.assignments,
    students: STORAGE_KEYS.students,
    submissions: STORAGE_KEYS.submissions,
    messages: STORAGE_KEYS.messages,
    seen: STORAGE_KEYS.seen
  };
  let changed = false;
  Object.keys(map).forEach((field) => {
    if (data[field] === undefined) return;
    const incoming = JSON.stringify(data[field]);
    const current = localStorage.getItem(map[field]);
    if (incoming === current) return; // identical — this is just Firestore echoing our own write back
    localStorage.setItem(map[field], incoming);
    changed = true;
  });
  if (changed) render();
}

function startCloudSync() {
  if (!window.nimbusCloud) return;
  window.nimbusCloud.ensureAuth().then(() => {
    window.nimbusCloud.subscribe((data) => {
      if (!cloudBootstrapped) {
        cloudBootstrapped = true;
        if (!data) {
          // First time ever running: seed the cloud with what's already on this device.
          window.nimbusCloud.push('assignments', getAssignments());
          window.nimbusCloud.push('students', getStudents());
          window.nimbusCloud.push('submissions', getSubmissions());
          window.nimbusCloud.push('messages', getMessages());
          window.nimbusCloud.push('seen', getSeenMap());
          return;
        }
      }
      applyCloudData(data);
    });
  });
}

if (window.nimbusCloud) startCloudSync();
else window.addEventListener('nimbus-firebase-ready', startCloudSync);

  // PWA installability — capture the browser's install prompt so we can trigger it from our own button
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const installBtn = document.getElementById('install-app-btn');
    if (installBtn) installBtn.classList.remove('hidden');
  });

  // Some browsers still gate the install prompt behind a registered service
  // worker with a fetch handler. sw.js is optional — if it isn't deployed
  // alongside index.html this silently no-ops and the manifest-only criteria
  // (already satisfied above) still applies on modern Chrome/Edge.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // Cross-tab live sync + notifications: if Nimbus is open in another tab on this
  // device (e.g. teacher's laptop with an admin tab and a demo student tab), pick
  // up changes instantly and fire a browser notification if enabled.
  window.addEventListener('storage', (e) => {
    if (!e.key) return;
    const current = getSession();
    if (current) {
      if (e.key === STORAGE_KEYS.submissions && current.role === 'admin') {
        notifyBrowser('Nimbus', 'A student submitted homework for review.');
      }
      if (e.key === STORAGE_KEYS.messages) {
        if (current.role === 'admin') notifyBrowser('Nimbus', 'New message from a student.');
        if (current.role === 'learner') notifyBrowser('Nimbus', ADMIN_NAME + ' sent you a message.');
      }
      if (e.key === STORAGE_KEYS.assignments && current.role === 'learner') {
        notifyBrowser('Nimbus', 'New homework has been posted.');
      }
    }
    render();
  });
})();
</script>
</body>
</html>
