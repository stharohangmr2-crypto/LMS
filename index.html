<script>
  // Prism's default tag-name pattern (/^<\/?[^\s>\/]+/) is greedy and, when
  // there's no space before an attribute (e.g. the editor's own
  // <connect="file.css"> shorthand), it swallows the whole ="value" part
  // into the tag-name token — so the string never gets its own attr-value
  // token and shows up uncolored. Stopping the tag-name at "=" too lets
  // Prism split off the ="value" part normally so it highlights as a string.
  try {
    var tagInside = window.Prism && Prism.languages.markup && Prism.languages.markup.tag && Prism.languages.markup.tag.inside;
    if (tagInside && tagInside.tag && tagInside.tag.pattern) {
      tagInside.tag.pattern = /^<\/?[^\s>\/=]+/;
    }
  } catch (err) {}
</script>

<style>
  :root{ --ease: cubic-bezier(0.22, 1, 0.36, 1); }
  * { font-family: 'Inter', sans-serif; }

  .font-mono2 { font-family: 'IBM Plex Mono', monospace; }
  .font-hand { font-family: 'Caveat', cursive; }
  html, body { overflow-x: hidden; background: #F1EBDA; }
  body { position: relative; }

  body::after{
    content:'';
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    opacity: 0.05;
    background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj4KPGZpbHRlciBpZD0ibiI+PGZlVHVyYnVsZW5jZSB0eXBlPSJmcmFjdGFsTm9pc2UiIGJhc2VGcmVxdWVuY3k9IjAuODUiIG51bU9jdGF2ZXM9IjMiIHN0aXRjaFRpbGVzPSJzdGl0Y2giLz48ZmVDb2xvck1hdHJpeCB0eXBlPSJzYXR1cmF0ZSIgdmFsdWVzPSIwIi8+PC9maWx0ZXI+CjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNuKSIvPgo8L3N2Zz4=");
    background-size: 180px 180px;
    mix-blend-mode: overlay;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d8cca4; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #c7b98a; }

  @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes toastIn {
    0% { opacity: 0; transform: translate(-50%, 16px) scale(0.95); }
    100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }
  @keyframes bellRing {
    0%, 100% { transform: rotate(0); }
    15% { transform: rotate(14deg); } 30% { transform: rotate(-12deg); }
    45% { transform: rotate(9deg); } 60% { transform: rotate(-6deg); } 75% { transform: rotate(3deg); }
  }
  @keyframes pulseDot {
    0% { box-shadow: 0 0 0 0 rgba(164,50,30,0.45); }
    70% { box-shadow: 0 0 0 6px rgba(164,50,30,0); }
    100% { box-shadow: 0 0 0 0 rgba(164,50,30,0); }
  }
  .anim-fade-up { animation: fadeSlideUp 0.5s var(--ease) both; }
  .anim-fade { animation: fadeIn 0.4s var(--ease) both; }
  .anim-toast { animation: toastIn 0.4s var(--ease) both; }
  .bell-ring { animation: bellRing 1.6s var(--ease); transform-origin: top center; }
  .pulse-dot { animation: pulseDot 2.2s infinite; }
  .stagger-1 { animation-delay: 0.05s; } .stagger-2 { animation-delay: 0.1s; }
  .stagger-3 { animation-delay: 0.15s; } .stagger-4 { animation-delay: 0.2s; }

  .workspace-panel { transform: translateX(100%); transition: transform 0.45s var(--ease); }
  .workspace-panel.open { transform: translateX(0); }
  .workspace-overlay { opacity: 0; pointer-events: none; transition: opacity 0.35s var(--ease); }
  .workspace-overlay.open { opacity: 1; pointer-events: auto; }

  .notebook-paper {
    background-image: repeating-linear-gradient(to bottom, #FBF8EF 0px, #FBF8EF 35px, #DCE3EE 36px);
    background-attachment: local;
    line-height: 36px;
    padding-top: 8px;
  }
  .notebook-margin { position: absolute; top: 0; bottom: 0; left: 56px; width: 2px; background: linear-gradient(to bottom, rgba(164,50,30,0.4), rgba(164,50,30,0.75) 55%, rgba(164,50,30,0.4)); }

  .field-underline { border-bottom: 2px solid rgba(28,23,18,0.15); transition: border-color 0.3s var(--ease); }
  .field-underline:focus-within { border-color: #A4321E; }

  .nav-item { transition: all 0.25s var(--ease); }
  .card-hover { transition: all 0.3s var(--ease); }
  .card-hover:hover { transform: translateY(-3px); box-shadow: 0 22px 38px -20px rgba(28,23,18,0.28); }
  .btn-press { transition: all 0.25s var(--ease); }
  .btn-press:active { transform: scale(0.96); }

  .stamp {
    display: inline-flex; align-items: center; position: relative; line-height: 1;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4.5px 10px 4px; border-radius: 5px; border: 1.5px solid currentColor;
    transform: rotate(-2deg);
  }
  .stamp::after {
    content: ''; position: absolute; inset: 2.5px; border: 1px solid currentColor;
    border-radius: 2.5px; opacity: 0.5; pointer-events: none;
  }
  .stamp-ink { color: #1C1712; background: rgba(28,23,18,0.05); }
  .stamp-red { color: #A4321E; background: rgba(164,50,30,0.07); }
  .stamp-moss { color: #3F5A44; background: rgba(63,90,68,0.08); }
  .stamp-ochre { color: #B8862B; background: rgba(184,134,43,0.09); }

  .ribbon { clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 74%, 0 100%); }

  .code-editor {
    background: #1C1712; color: #F1EBDA; font-family: 'IBM Plex Mono', monospace;
    line-height: 1.6; tab-size: 2;
  }
  .segmented button.active { background: #1C1712; color: #F1EBDA; }

  /* ---- Live syntax-highlighted code editor (gutter + overlay + textarea) ---- */
  .code-editor-shell { background: #1C1712; }
  .code-gutter {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8125rem; line-height: 1.6;
    color: rgba(241,235,218,0.32); text-align: right; user-select: none;
    padding: 1.25rem 0.55rem 1.25rem 0.75rem; overflow: hidden;
    border-right: 1px solid rgba(241,235,218,0.08); min-width: 3rem;
  }
  .code-gutter div { white-space: nowrap; }
  .code-highlight-pre, .code-editor-input {
    position: absolute; inset: 0; margin: 0; box-sizing: border-box;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8125rem; line-height: 1.6;
    tab-size: 2; white-space: pre; padding: 1.25rem; border: 0; outline: none;
    font-variant-ligatures: none; font-kerning: none; letter-spacing: normal; word-spacing: normal;
  }
  .code-highlight-pre { pointer-events: none; color: #F1EBDA; background: transparent; overflow: hidden; }
  .code-highlight-pre code { background: none; font-family: inherit; font-size: inherit; }
  .code-editor-input {
    background: transparent; color: transparent; caret-color: #F1EBDA; resize: none;
    -webkit-text-fill-color: transparent; white-space: pre; overflow: auto;
  }
  .code-editor-input::selection { background: rgba(164,50,30,0.4); }
  .code-editor-input.is-composing { color: #F1EBDA; -webkit-text-fill-color: #F1EBDA; }
  .code-highlight-pre.is-hidden-composing { opacity: 0; }
  /* Warm token palette matching Nimbus's overall color system */
  .token.tag, .token.selector { color: #E7BEAC; } /* fallback before per-tag-name JS coloring kicks in */
  .token.keyword { color: #8A9564; }
  .token.attr-name, .token.property, .token.function { color: #D9A441; }
  .token.attr-value, .token.string, .token.char { color: #8FA97A; }
  .token.comment { color: rgba(241,235,218,0.4); font-style: italic; }
  .token.punctuation { color: rgba(241,235,218,0.85); }
  .token.number, .token.boolean { color: #C97B63; }
  .token.doctype, .token.important { color: rgba(241,235,218,0.5); }
  .token.entity { color: #D9A441; }
  .token.class-name, .token.maybe-class-name { color: #D98E73; }
  .token.operator, .token.url { color: rgba(241,235,218,0.68); }
  .token.regex, .token.variable { color: #B58A6A; }

  .chat-scroll { scroll-behavior: smooth; }
  .chat-bubble-in { border-bottom-left-radius: 4px; }
  .chat-bubble-out { border-bottom-right-radius: 4px; }

  .mck-key { transition: background 0.15s var(--ease), color 0.15s var(--ease); user-select: none; -webkit-user-select: none; touch-action: manipulation; }
  .mck-key.active { background: #A4321E !important; color: #F1EBDA !important; }
  .mck-row-scroll::-webkit-scrollbar { display: none; }
  .mck-row-scroll { scrollbar-width: none; }
  .workspace-more-menu { transform-origin: top right; transition: opacity 0.15s var(--ease), transform 0.15s var(--ease); }
  .workspace-more-menu.hidden-menu { opacity: 0; transform: scale(0.94) translateY(-4px); pointer-events: none; }
  .fs-mode #workspace-more-btn { color: #F1EBDA; }
  .fs-mode #workspace-more-btn:hover { background: rgba(241,235,218,0.08); }
  .fs-mode.workspace-panel { width: 100% !important; }
  .fs-mode #workspace-prompt-panel { display: none; }
  .fs-mode #workspace-footer { display: none; }
  .fs-mode #workspace-header { background: #1C1712; border-bottom-color: rgba(241,235,218,0.1); }
  .fs-mode #workspace-header h2, .fs-mode #workspace-header p { color: #F1EBDA; }
  .fs-mode #workspace-header .segmented { background: rgba(241,235,218,0.08); }
  .fs-mode #workspace-header .editor-view-btn { color: #F1EBDA; }
  .fs-mode #workspace-header .editor-view-btn.active { background: #F1EBDA; color: #1C1712; }
  .fs-mode #fullscreen-toggle, .fs-mode #close-workspace, .fs-mode #preview-toggle-mobile, .fs-mode #workspace-more-btn { color: #F1EBDA; }

  // Firebase — powers cross-device cloud sync (assignments/students/submissions/
  // messages all live in Firestore now, not just localStorage) and Google sign-in.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, signInAnonymously,
    GoogleAuthProvider, signInWithPopup, signOut
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, doc, onSnapshot, setDoc
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBityEDCgL-xtnfwA5sKALaDk29j-rBe1g",
    authDomain: "lms-f25ec.firebaseapp.com",
    projectId: "lms-f25ec",

    appId: "1:716535124320:web:90a257c44b3b4a9de78e05",
    measurementId: "G-9GH2544KG0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  // Every class shares one document. Fine for a single classroom's worth of data.
  const cloudRef = doc(db, "nimbus", "classroom");

  async function ensureAuth() {
    if (auth.currentUser) return auth.currentUser;
    return new Promise((resolve) => {
      const unsub = onAuthStateChanged(auth, (user) => {
        unsub();
        if (user) { resolve(user); return; }
        signInAnonymously(auth)
          .then((cred) => resolve(cred.user))
          .catch((err) => { console.error("Nimbus: anonymous sign-in failed", err); resolve(null); });
      });
    });
  }

  window.nimbusCloud = {
    async ensureAuth() { return ensureAuth(); },
    async signInWithGoogle() {
      const provider = new GoogleAuthProvider();
      const result = await signInWithPopup(auth, provider);
      const u = result.user;
      return { uid: u.uid, name: u.displayName || "", email: u.email || "", photoURL: u.photoURL || "" };
    },
    async signOutGoogle() {
      try { await signOut(auth); } catch (e) { /* no-op */ }
      try { await signInAnonymously(auth); } catch (e) { console.error("Nimbus: re-auth after sign-out failed", e); }
    },
    subscribe(callback) {
      onSnapshot(cloudRef, (snap) => callback(snap.exists() ? snap.data() : null),
        (err) => console.error("Nimbus: cloud sync error", err));
    },
    async push(field, value) {
      try { await setDoc(cloudRef, { [field]: value }, { merge: true }); }
      catch (err) { console.error("Nimbus: cloud write failed for '" + field + "'", err); }
    }
  };

  window.dispatchEvent(new Event("nimbus-firebase-ready"));
</script>

  saveMessages(list);
}

function getSeenMap() {
  const raw = localStorage.getItem(STORAGE_KEYS.seen);
  try { return raw ? JSON.parse(raw) : {}; } catch (e) { return {}; }
}
function saveSeenMap(map) {
  localStorage.setItem(STORAGE_KEYS.seen, JSON.stringify(map));
  if (window.nimbusCloud) window.nimbusCloud.push('seen', map);
}
function getSeenIds(studentId) { const map = getSeenMap(); return map[studentId] || []; }
function markAllSeen(studentId) { const map = getSeenMap(); map[studentId] = getAssignments().map(a => a.id); saveSeenMap(map); }

function getSession() { const raw = localStorage.getItem(STORAGE_KEYS.session); try { return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
function setSession(s) { localStorage.setItem(STORAGE_KEYS.session, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(STORAGE_KEYS.session); }

function timeAgo(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}
function formatDate(ts) { return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function formatDateTime(ts) { return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' · ' + new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }
function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str == null ? '' : str; return div.innerHTML; }
function prismLangFor(codeLang) { return { html: 'markup', css: 'css', js: 'javascript' }[(codeLang || 'html').toLowerCase()] || 'markup'; }
function capitalize(str) { return str.charAt(0).toUpperCase() + str.slice(1); }
function isWithinDays(ts, days) { return ts && (Date.now() - ts) < days * 24 * 60 * 60 * 1000; }
function isThisCalendarMonth(ts) {
  if (!ts) return false;
  const d = new Date(ts), now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
}

function isOverdue(assignment, studentId) {
  if (!assignment.dueAt) return false;
  const st = submissionStatus(assignment.id, studentId);
  if (st !== 'pending' && st !== 'revision') return false;
  return Date.now() > assignment.dueAt;
}
function dueLabel(dueAt) {
  if (!dueAt) return '';
  const days = Math.ceil((dueAt - Date.now()) / (1000 * 60 * 60 * 24));
  if (days < 0) return 'Overdue';
  if (days === 0) return 'Due today';
  if (days === 1) return 'Due tomorrow';
  return 'Due ' + formatDate(dueAt);
}

// ---------- BACKUP / RESTORE ----------
function exportBackup() {
  const data = {};
  Object.keys(STORAGE_KEYS).forEach(k => {
    if (k === 'session') return;
    const raw = localStorage.getItem(STORAGE_KEYS[k]);
    if (raw != null) data[STORAGE_KEYS[k]] = raw;
  });
  const payload = { app: 'nimbus', exportedAt: Date.now(), data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nimbus-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}
function importBackupFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed || parsed.app !== 'nimbus' || !parsed.data) throw new Error('bad file');
      Object.keys(parsed.data).forEach(key => localStorage.setItem(key, parsed.data[key]));
      showToast('Backup restored!');
      render();
    } catch (e) {
      showToast('That file doesn\'t look like a valid Nimbus backup.');
    }
  };
  reader.readAsText(file);
}

// Classify a student's status on one assignment: 'pending' | 'submitted' | 'checked' | 'revision'
function submissionStatus(assignmentId, studentId) {
  const sub = getSubmission(assignmentId, studentId);
  return sub ? sub.status : 'pending';
}
function studentProgress(studentId) {
  const assignments = getAssignments();
  const out = { total: assignments.length, pending: 0, submitted: 0, checked: 0, revision: 0 };
  assignments.forEach(a => {
    const st = submissionStatus(a.id, studentId);
    out[st] = (out[st] || 0) + 1;
  });
  return out;
}

function showToast(message) {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'anim-toast bg-ink text-paper px-5 py-3.5 rounded-2xl shadow-2xl shadow-black/40 flex items-center gap-2.5 whitespace-nowrap';
  el.innerHTML = '<span class="flex h-5 w-5 items-center justify-center rounded-full border border-paper/30 shrink-0">' + ic('check', 'w-3 h-3 text-paper') + '</span><span class="text-sm font-medium">' + message + '</span>';
  root.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'all 0.3s ease';
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, 8px) scale(0.96)';
    setTimeout(() => el.remove(), 320);
  }, 2600);
}

function notifyBrowser(title, body) {
  if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  try { new Notification(title, { body, icon: undefined }); } catch (e) {}
}
function notificationsEnabled() { return typeof Notification !== 'undefined' && Notification.permission === 'granted'; }
function requestNotificationPermission() {
  if (typeof Notification === 'undefined') { showToast('Notifications are not supported on this device.'); return; }
  Notification.requestPermission().then(perm => {
    showToast(perm === 'granted' ? 'Notifications enabled!' : 'Notifications not enabled.');
    render();
  });
}

function showConfirm(opts) {
  return new Promise((resolve) => {
    const existing = document.getElementById('confirm-root');
    if (existing) existing.remove();
    const danger = !!opts.danger;
    const wrapper = document.createElement('div');
    wrapper.id = 'confirm-root';
    wrapper.innerHTML = `
      <div id="cf-overlay" class="fixed inset-0 bg-ink/55 backdrop-blur-sm z-[95] opacity-0 transition-opacity duration-300"></div>
      <div class="fixed inset-x-0 bottom-0 sm:inset-0 flex sm:items-center justify-center z-[96] pointer-events-none">
        <div id="cf-card" class="pointer-events-auto w-full sm:max-w-sm sm:mx-4 bg-papercard rounded-t-[1.75rem] sm:rounded-[1.75rem] border border-ink/10 shadow-2xl p-6 sm:p-7 pb-8 sm:pb-7 translate-y-8 sm:translate-y-4 opacity-0 transition-all duration-300">
          <div class="mx-auto sm:hidden w-10 h-1 rounded-full bg-ink/15 mb-5"></div>
          <div class="w-11 h-11 rounded-full ${danger ? 'bg-redline/10 text-redline' : 'bg-ink/8 text-ink'} flex items-center justify-center mb-4">
            ${ic(danger ? 'alertTriangle' : 'sparkle', 'w-5 h-5')}
          </div>
          <h3 class="font-display text-lg font-semibold text-ink mb-2 leading-snug">${escapeHtml(opts.title || '')}</h3>
          <p class="text-sm text-graphite leading-relaxed mb-6">${escapeHtml(opts.message || '')}</p>
          <div class="flex flex-col-reverse sm:flex-row gap-2.5">
            <button id="cf-cancel" class="flex-1 py-3 rounded-full font-semibold text-sm text-ink bg-ink/5 hover:bg-ink/10 transition-colors">${escapeHtml(opts.cancelLabel || 'Cancel')}</button>
            <button id="cf-confirm" class="btn-press flex-1 py-3 rounded-full font-semibold text-sm text-paper ${danger ? 'bg-redline hover:opacity-90' : 'bg-ink hover:bg-[#2a221a]'} transition-colors shadow-md shadow-black/10">${escapeHtml(opts.confirmLabel || 'Confirm')}</button>
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(wrapper);

    requestAnimationFrame(() => {
      document.getElementById('cf-overlay').classList.remove('opacity-0');
      document.getElementById('cf-card').classList.remove('translate-y-8', 'sm:translate-y-4', 'opacity-0');
    });

    const cleanup = (result) => {
      const overlay = document.getElementById('cf-overlay');
      const card = document.getElementById('cf-card');
      if (overlay) overlay.classList.add('opacity-0');
      if (card) card.classList.add('translate-y-8', 'opacity-0');
      setTimeout(() => { const el = document.getElementById('confirm-root'); if (el) el.remove(); }, 280);
      resolve(result);
    };

    document.getElementById('cf-overlay').addEventListener('click', () => cleanup(false));
    document.getElementById('cf-cancel').addEventListener('click', () => cleanup(false));
    document.getElementById('cf-confirm').addEventListener('click', () => cleanup(true));
  });
}

function openSidebarDrawer() {
  const panel = document.getElementById('mobile-sidebar');
  const backdrop = document.getElementById('mobile-sidebar-backdrop');
  if (panel) { panel.classList.remove('-translate-x-full'); panel.classList.add('translate-x-0'); }
  if (backdrop) { backdrop.classList.remove('opacity-0', 'pointer-events-none'); backdrop.classList.add('opacity-100', 'pointer-events-auto'); }
}
function closeSidebarDrawer() {
  const panel = document.getElementById('mobile-sidebar');
  const backdrop = document.getElementById('mobile-sidebar-backdrop');
  if (panel) { panel.classList.add('-translate-x-full'); panel.classList.remove('translate-x-0'); }
  if (backdrop) { backdrop.classList.add('opacity-0', 'pointer-events-none'); backdrop.classList.remove('opacity-100', 'pointer-events-auto'); }
}

// ---------- DASHBOARD ----------
function renderAdminDashboard(session) {
  const students = getStudents();
  const assignments = getAssignments().slice().sort((a, b) => b.createdAt - a.createdAt);
  const submissions = getSubmissions();

  const studentsThisMonth = students.filter(s => isThisCalendarMonth(s.joinedAt)).length;
  const assignmentsThisWeek = assignments.filter(a => isWithinDays(a.createdAt, 7)).length;
  const checkedThisWeek = submissions.filter(s => (s.status === 'checked' || s.status === 'revision') && isWithinDays(s.checkedAt, 7)).length;

  // Build per-assignment breakdown of who has / hasn't done it
  const breakdown = assignments.map(a => {
    const notDone = [];
    const done = [];
    students.forEach(st => {
      const sub = getSubmission(a.id, st.id);
      if (!sub) notDone.push(st);
      else done.push({ student: st, sub });
    });
    return { assignment: a, notDone, done };
  });

  return `
  ${adminPageHeader('Good to see you, ' + escapeHtml((session?.name || 'Admin').split(' ')[0]), "Here's what's happening across your class this week.")}

  <div class="grid grid-cols-3 gap-3 sm:gap-4 mb-8 anim-fade-up stagger-1">
    <div class="bg-papercard rounded-2xl border border-ink/8 p-4 sm:p-5 card-hover">
      <p class="text-3xl sm:text-4xl font-display font-semibold text-ink">${studentsThisMonth}</p>
      <p class="font-mono2 text-[10px] tracking-wide uppercase text-graphite mt-1 leading-snug">Students joined this month</p>
    </div>
    <div class="bg-papercard rounded-2xl border border-ink/8 p-4 sm:p-5 card-hover">
      <p class="text-3xl sm:text-4xl font-display font-semibold text-ink">${assignmentsThisWeek}</p>
      <p class="font-mono2 text-[10px] tracking-wide uppercase text-graphite mt-1 leading-snug">Homework given this week</p>
    </div>
    <div class="bg-papercard rounded-2xl border border-ink/8 p-4 sm:p-5 card-hover">
      <p class="text-3xl sm:text-4xl font-display font-semibold text-ink">${checkedThisWeek}</p>
      <p class="font-mono2 text-[10px] tracking-wide uppercase text-graphite mt-1 leading-snug">Homework checked this week</p>
    </div>
  </div>

  ${students.length === 0 ? `
    <div class="bg-papercard rounded-2xl border border-dashed border-ink/20 p-10 text-center anim-fade-up stagger-2">
      <div class="text-ink/25 mx-auto mb-2 w-6 h-6">${ic('users', 'w-6 h-6 mx-auto')}</div>
      <p class="text-sm text-graphite">No students have signed up yet. Share your Nimbus link so they can create an ID.</p>
    </div>
  ` : `
  <div class="anim-fade-up stagger-2">
    <div class="flex items-center gap-2 mb-5">
      <div class="w-8 h-8 rounded-xl bg-ink/5 flex items-center justify-center">${ic('listChecks', 'w-4 h-4 text-ink/70')}</div>
      <h2 class="font-display font-semibold text-lg text-ink">Homework Status, by Assignment</h2>
    </div>
    <div class="space-y-4">
      ${breakdown.length === 0 ? `
        <div class="bg-papercard rounded-2xl border border-dashed border-ink/20 p-10 text-center">
          <p class="text-sm text-graphite">No homework published yet.</p>
        </div>
      ` : breakdown.map(b => `
        <div class="relative bg-papercard rounded-2xl border border-dashed border-ink/20 p-5 pt-6 card-hover">
          ${notch()}
          <div class="flex items-center justify-between gap-3 mb-4 flex-wrap">
            <h3 class="font-semibold text-ink text-sm">${escapeHtml(b.assignment.title)}</h3>
            <span class="font-mono2 text-[10px] text-graphite/70 tracking-wide">${b.done.length}/${students.length} DONE</span>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <p class="font-mono2 text-[10px] font-semibold text-redline uppercase tracking-widest mb-2">Haven't Done It</p>
              ${b.notDone.length === 0 ? `<p class="text-xs text-graphite/70 italic">Everyone's turned this in.</p>` : `
                <div class="flex flex-wrap gap-1.5">
                  ${b.notDone.map(st => `<span class="text-xs font-medium bg-redline/6 text-redline border border-redline/20 rounded-full px-2.5 py-1">${escapeHtml(st.name)}</span>`).join('')}
                </div>
              `}
            </div>
            <div>
              <p class="font-mono2 text-[10px] font-semibold text-moss uppercase tracking-widest mb-2">Have Done It</p>
              ${b.done.length === 0 ? `<p class="text-xs text-graphite/70 italic">No submissions yet.</p>` : `
                <div class="flex flex-wrap gap-1.5">
                  ${b.done.map(d => `<span class="text-xs font-medium bg-moss/6 text-moss border border-moss/20 rounded-full px-2.5 py-1">${escapeHtml(d.student.name)}${d.sub.status === 'checked' ? ' ✓' : d.sub.status === 'revision' ? ' ⚠' : ''}</span>`).join('')}
                </div>
              `}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>
  `}
  `;
}

// ---------- PUBLISHED TASKS ----------
function statusChip(status) {
  if (status === 'checked') return stamp('Checked ✓', 'moss');
  if (status === 'revision') return stamp('Needs Revision', 'red');
  if (status === 'submitted') return stamp('Awaiting Review', 'ochre');
  return stamp('Not Done', 'ink');
}

function chatThreadHtml(studentId, forRole) {
  const thread = getThread(studentId);
  if (thread.length === 0) {
    return `<div class="flex-1 flex items-center justify-center py-10"><p class="text-xs text-graphite/60 italic">No messages yet. Say hello.</p></div>`;
  }
  return thread.map(m => {
    const mine = m.sender === forRole;
    return `
    <div class="flex ${mine ? 'justify-end' : 'justify-start'}">
      <div class="max-w-[80%]">
        <div class="${mine ? 'chat-bubble-out bg-ink text-paper' : 'chat-bubble-in bg-paper/70 text-ink border border-ink/10'} rounded-2xl px-4 py-2.5 text-sm leading-snug">${escapeHtml(m.text)}</div>
        <p class="font-mono2 text-[9px] text-graphite/50 mt-1 ${mine ? 'text-right' : 'text-left'}">${formatDateTime(m.ts)}</p>
      </div>
    </div>
    `;
  }).join('');
}

function mountStudentDetail(studentId) {
  const existing = document.getElementById('student-detail-root');
  if (existing) existing.remove();
  const student = findStudent(studentId);
  if (!student) { activeStudentDetailId = null; return; }

  const assignments = getAssignments().slice().sort((a, b) => b.createdAt - a.createdAt);
  const progress = studentProgress(studentId);

  const wrapper = document.createElement('div');
  wrapper.id = 'student-detail-root';
  wrapper.innerHTML = `
    <div id="sd-overlay" class="workspace-overlay fixed inset-0 bg-ink/50 backdrop-blur-sm z-[60]"></div>

        <div class="flex items-center gap-3 min-w-0">
          <div class="w-10 h-10 rounded-full bg-ink text-paper flex items-center justify-center font-semibold text-sm shrink-0">${escapeHtml(student.name.charAt(0).toUpperCase())}</div>
          <div class="min-w-0">
            <h2 class="font-display font-semibold text-ink text-base truncate">${escapeHtml(student.name)}</h2>

        <button data-sd-tab="progress" class="sd-tab-btn ${studentDetailTab === 'progress' ? 'bg-ink text-paper' : 'bg-ink/5 text-ink hover:bg-ink/10'} btn-press px-4 py-2 rounded-full text-xs font-semibold transition-colors flex items-center gap-1.5">${ic('trending', 'w-3.5 h-3.5')} Progress</button>
        <button data-sd-tab="chat" class="sd-tab-btn ${studentDetailTab === 'chat' ? 'bg-ink text-paper' : 'bg-ink/5 text-ink hover:bg-ink/10'} btn-press px-4 py-2 rounded-full text-xs font-semibold transition-colors flex items-center gap-1.5">${ic('chat', 'w-3.5 h-3.5')} Message${unreadFromStudent(studentId) > 0 ? ` <span class="w-4 h-4 rounded-full bg-redline text-paper text-[9px] flex items-center justify-center">${unreadFromStudent(studentId)}</span>` : ''}</button>
      </div>

      ${studentDetailTab === 'chat' ? `
      <div class="flex-1 flex flex-col overflow-hidden">
        <div id="sd-chat-scroll" class="chat-scroll flex-1 overflow-y-auto px-6 sm:px-8 py-5 space-y-3">
          ${chatThreadHtml(studentId, 'admin')}
        </div>
        <form id="sd-chat-form" class="shrink-0 px-6 sm:px-8 py-4 border-t border-ink/10 flex items-center gap-3">
          <input id="sd-chat-input" type="text" autocomplete="off" placeholder="Message ${escapeHtml(student.name.split(' ')[0])}..."
            class="flex-1 px-4 py-3 rounded-full bg-paper/60 border border-ink/10 outline-none text-sm text-ink placeholder:text-graphite/50 focus:border-redline transition-colors" />
          <button type="submit" class="btn-press w-11 h-11 rounded-full bg-ink text-paper flex items-center justify-center shrink-0 shadow-md shadow-black/15">${ic('sendHorizontal', 'w-4 h-4')}</button>
        </form>
      </div>
      ` : `
      <div class="flex-1 overflow-y-auto px-6 sm:px-8 py-5">
        <div class="grid grid-cols-4 gap-2.5 mb-6">
          <div class="bg-paper/50 rounded-xl p-3 text-center"><p class="font-display text-xl font-semibold text-ink">${progress.total}</p><p class="font-mono2 text-[9px] uppercase text-graphite mt-0.5">Total</p></div>
          <div class="bg-redline/6 rounded-xl p-3 text-center"><p class="font-display text-xl font-semibold text-redline">${progress.pending}</p><p class="font-mono2 text-[9px] uppercase text-graphite mt-0.5">Pending</p></div>
          <div class="bg-ochre/8 rounded-xl p-3 text-center"><p class="font-display text-xl font-semibold text-ochre">${progress.submitted + progress.revision}</p><p class="font-mono2 text-[9px] uppercase text-graphite mt-0.5">Awaiting</p></div>
          <div class="bg-moss/8 rounded-xl p-3 text-center"><p class="font-display text-xl font-semibold text-moss">${progress.checked}</p><p class="font-mono2 text-[9px] uppercase text-graphite mt-0.5">Checked</p></div>
        </div>
        <p class="font-mono2 text-[10px] font-semibold text-graphite uppercase tracking-widest mb-3">Every Assignment</p>

            const sub = getSubmission(a.id, studentId);
            const status = sub ? sub.status : 'pending';

            <div class="flex items-center justify-between gap-3 bg-paper/40 rounded-xl px-4 py-3">
              <div class="min-w-0">
                <p class="text-sm font-medium text-ink truncate">${escapeHtml(a.title)}</p>
                <p class="font-mono2 text-[9px] text-graphite/60 mt-0.5 uppercase">${a.type === 'code' ? (a.codeLang || 'html') : a.type === 'mcq' ? 'mcq quiz' : 'written'}</p>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                ${statusChip(status)}
                ${sub ? `<button data-review="${a.id}|${studentId}" class="btn-press font-mono2 text-[10px] uppercase tracking-wide font-semibold text-ink bg-ink/5 hover:bg-ink/10 rounded-full px-3 py-1.5">View</button>` : ''}
              </div>
            </div>
            `;
          }).join('')}
        </div>
      </div>
      `}
    </div>
  `;
  document.body.appendChild(wrapper);

  requestAnimationFrame(() => {
    document.getElementById('sd-overlay').classList.add('open');
    document.getElementById('sd-panel').classList.add('open');
    const scroller = document.getElementById('sd-chat-scroll');
    if (scroller) scroller.scrollTop = scroller.scrollHeight;
  });

  if (studentDetailTab === 'chat') markThreadRead(studentId, 'admin');

  document.getElementById('close-student-detail').addEventListener('click', closeStudentDetail);
  document.getElementById('sd-overlay').addEventListener('click', closeStudentDetail);

  wrapper.querySelectorAll('[data-sd-tab]').forEach(btn => {
    btn.addEventListener('click', () => { studentDetailTab = btn.dataset.sdTab; render(); });
  });

  wrapper.querySelectorAll('[data-review]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [assignmentId, sid] = btn.dataset.review.split('|');
      activeReviewKey = { assignmentId, studentId: sid };
      render();
    });
  });

  const chatForm = document.getElementById('sd-chat-form');
  if (chatForm) {
    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('sd-chat-input');
      const text = input.value.trim();
      if (!text) return;
      sendMessage(studentId, 'admin', text);
      input.value = '';
      render();
    });
  }
}

function closeStudentDetail() {
  const overlay = document.getElementById('sd-overlay');
  const panel = document.getElementById('sd-panel');
  if (overlay) overlay.classList.remove('open');
  if (panel) panel.classList.remove('open');
  activeStudentDetailId = null;
  setTimeout(() => { const el = document.getElementById('student-detail-root'); if (el) el.remove(); }, 460);
}

function buildPreviewDoc(lang, code) {
  const safe = code || '';
  if (lang === 'css') {
    return '<!DOCTYPE html><html><head><style>' + safe + '</style></head><body style="font-family:sans-serif;padding:20px;margin:0;"><h1>Sample Heading</h1><p>This is a paragraph of sample text so you can see how your styles look.</p><button>Click Me</button><ul><li>List item one</li><li>List item two</li></ul></body></html>';
  }
  if (lang === 'js') {
    return '<!DOCTYPE html><html><body style="font-family:\'IBM Plex Mono\',monospace;padding:16px;font-size:13px;background:#1C1712;color:#F1EBDA;margin:0;min-height:100vh;"><div id="out"></div><scr' + 'ipt>const out=document.getElementById("out");function log(){const d=document.createElement("div");d.style.marginBottom="4px";d.style.borderBottom="1px dashed rgba(241,235,218,0.15)";d.style.paddingBottom="4px";const args=Array.prototype.slice.call(arguments);d.textContent=args.map(function(x){return typeof x==="object"?JSON.stringify(x):String(x);}).join(" ");out.appendChild(d);}console.log=log;try{' + safe + '}catch(e){log("Error: "+e.message);}</scr' + 'ipt></body></html>';
  }
  return safe;
}

          ` : ''}

          <div class="pt-5 border-t border-dashed border-ink/15">
            <label class="font-mono2 text-[10px] font-semibold text-graphite uppercase tracking-widest mb-2 block">Score <span class="normal-case font-sans text-graphite/70">(optional, out of 100)</span></label>
            <input id="rv-grade" type="number" min="0" max="100" placeholder="e.g. 85" value="${typeof sub.grade === 'number' ? sub.grade : ''}"
              class="w-full mb-4 px-4 py-3 rounded-xl bg-papercard border border-ink/10 outline-none text-sm text-ink placeholder:text-graphite/50 focus:border-redline transition-colors" />
            <label class="font-mono2 text-[10px] font-semibold text-graphite uppercase tracking-widest mb-2 block">Remark ${isCode ? '/ Feedback' : ''} <span class="normal-case font-sans text-graphite/70">(shown to student if sent back)</span></label>
            <textarea id="rv-remark" rows="4" placeholder="e.g. Great start, but check your closing tags on line 3..."
              class="w-full px-4 py-3 rounded-xl bg-papercard border border-ink/10 outline-none text-sm text-ink placeholder:text-graphite/50 focus:border-redline transition-colors resize-none"></textarea>
            <div class="flex flex-col gap-2.5 mt-4">
              <button id="rv-approve" class="btn-press w-full py-3 rounded-full font-semibold text-sm text-paper bg-moss hover:opacity-90 transition-opacity flex items-center justify-center gap-2 shadow-md shadow-black/10">
                ${ic('checkCircle', 'w-4 h-4')} Approve — Checked ✓
              </button>
              <button id="rv-revision" class="btn-press w-full py-3 rounded-full font-semibold text-sm text-redline bg-redline/8 hover:bg-redline/14 transition-colors flex items-center justify-center gap-2 border border-redline/20">
                ${ic('alertTriangle', 'w-4 h-4')} Send Back for Revision
              </button>
            </div>
          </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden bg-papercard">
          ${isCode ? `
            <div class="flex items-center justify-between gap-1.5 px-4 sm:px-6 py-3 border-b border-ink/10 shrink-0">
              <span class="font-mono2 text-[10px] uppercase tracking-widest text-graphite">${(assignment.codeLang || 'html')} submission</span>
              <div class="segmented flex items-center gap-1 bg-ink/5 rounded-full p-1">
                <button type="button" data-rv-view="code" class="rv-view-btn active px-3 py-1.5 rounded-full text-xs font-semibold transition-colors">Code</button>
                <button type="button" data-rv-view="preview" class="rv-view-btn px-3 py-1.5 rounded-full text-xs font-semibold transition-colors">Preview</button>
              </div>
            </div>
            <div class="flex-1 overflow-hidden relative">
              <div id="rv-pane-code" class="absolute inset-0 overflow-auto">
                <pre class="code-editor text-xs p-5 min-h-full"><code id="rv-code-highlight" class="language-${prismLangFor(assignment.codeLang)}">${escapeHtml(sub.content)}</code></pre>
              </div>
              <div id="rv-pane-preview" class="absolute inset-0 overflow-hidden bg-white hidden">
                <iframe id="rv-preview-frame" class="w-full h-full border-0" sandbox="allow-scripts"></iframe>
              </div>
            </div>
          ` : `
            <div class="flex-1 overflow-y-auto relative px-4 sm:px-8 py-6">
              <div class="notebook-margin"></div>
              <div class="notebook-paper font-hand w-full min-h-full text-[22px] text-ink/85 pl-16 pr-4 whitespace-pre-wrap">${escapeHtml(sub.content)}</div>
            </div>
          `}
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(wrapper);

  requestAnimationFrame(() => {
    document.getElementById('rv-overlay').classList.add('open');
    document.getElementById('rv-panel').classList.add('open');
    if (isCode && window.Prism) { try { Prism.highlightElement(document.getElementById('rv-code-highlight')); } catch (err) {} }
  });

  document.getElementById('close-review').addEventListener('click', closeReview);
  document.getElementById('rv-overlay').addEventListener('click', closeReview);

  if (isCode) {
    let rvPreviewLoaded = false;
    wrapper.querySelectorAll('[data-rv-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.rvView;
        wrapper.querySelectorAll('[data-rv-view]').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('rv-pane-code').classList.toggle('hidden', mode !== 'code');
        document.getElementById('rv-pane-preview').classList.toggle('hidden', mode !== 'preview');
        if (mode === 'preview' && !rvPreviewLoaded) {
          rvPreviewLoaded = true;
          const doc = buildPreviewDoc(assignment.codeLang, sub.content);
          const url = URL.createObjectURL(new Blob([doc], { type: 'text/html' }));
          document.getElementById('rv-preview-frame').src = url;
        }
      });
    });
  }

  document.getElementById('rv-approve').addEventListener('click', () => {
    const gradeRaw = document.getElementById('rv-grade').value;
    const grade = gradeRaw === '' ? null : Math.max(0, Math.min(100, parseInt(gradeRaw, 10)));
    upsertSubmission(assignmentId, studentId, { status: 'checked', remark: document.getElementById('rv-remark').value.trim() || null, grade, checkedAt: Date.now() });
    showToast('Marked as checked!');
    closeReview();
    setTimeout(() => render(), 380);
  });
  document.getElementById('rv-revision').addEventListener('click', () => {
    const remark = document.getElementById('rv-remark').value.trim();
    if (!remark) {
      const ta = document.getElementById('rv-remark');
      ta.classList.add('ring-2', 'ring-redline/40');
      ta.placeholder = 'Add a remark so the student knows what to fix...';
      setTimeout(() => ta.classList.remove('ring-2', 'ring-redline/40'), 900);
      return;
    }
    const gradeRaw = document.getElementById('rv-grade').value;
    const grade = gradeRaw === '' ? null : Math.max(0, Math.min(100, parseInt(gradeRaw, 10)));
    upsertSubmission(assignmentId, studentId, { status: 'revision', remark, grade, checkedAt: Date.now() });
    showToast('Sent back for revision.');
    closeReview();
    setTimeout(() => render(), 380);
  });
}

function closeReview() {
  const overlay = document.getElementById('rv-overlay');
  const panel = document.getElementById('rv-panel');
  if (overlay) overlay.classList.remove('open');
  if (panel) panel.classList.remove('open');
  activeReviewKey = null;
  setTimeout(() => { const el = document.getElementById('review-root'); if (el) el.remove(); }, 460);
}

// ============================================================
// LEARNER — shell + tab router
// ============================================================
function renderLearner() {
  const session = getSession();
  const studentId = session?.id;
  const assignments = getAssignments().slice().sort((a, b) => b.createdAt - a.createdAt);
  const seenIds = getSeenIds(studentId);
  const newOnes = assignments.filter(a => !seenIds.includes(a.id));
  const revisionOnes = assignments.filter(a => submissionStatus(a.id, studentId) === 'revision');
  const showBanner = (newOnes.length > 0 || revisionOnes.length > 0) && !bannerDismissed;
  const bannerTargets = newOnes.concat(revisionOnes);
  const bannerGoto = bannerTargets.length === 1 ? bannerTargets[0].id : '';

  return `
  <div class="min-h-screen bg-paper">
    ${renderMobileHeader('learner', session?.name, newOnes.length > 0 || revisionOnes.length > 0 || unreadFromAdmin(studentId) > 0)}
    <div class="flex">
      ${renderSidebar('learner', learnerNav, session?.name, session)}
      <main class="flex-1 min-w-0">
        <div class="max-w-5xl mx-auto px-5 sm:px-8 py-6 sm:py-10">

          ${showBanner ? `
            <div id="notify-banner" data-goto="${bannerGoto}" class="anim-fade-up mb-6 relative overflow-hidden rounded-2xl border border-redline/25 bg-redline/6 p-4 sm:p-5 flex items-center gap-4 cursor-pointer hover:bg-redline/10 transition-colors duration-200">
              <div class="w-11 h-11 rounded-full border-2 border-redline flex items-center justify-center shrink-0 -rotate-3">
                <span class="bell-ring inline-block text-redline">${ic('bell', 'w-5 h-5')}</span>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-redline">
                  ${newOnes.length > 0 && revisionOnes.length > 0 ? `${newOnes.length} new · ${revisionOnes.length} need fixes` : newOnes.length > 0 ? (newOnes.length === 1 ? 'New homework posted' : newOnes.length + ' new homework posted') : (revisionOnes.length === 1 ? '1 homework needs a fix' : revisionOnes.length + ' homework need fixes')}
                </p>
                <p class="text-xs text-redline/75 truncate mt-0.5">${escapeHtml(newOnes.concat(revisionOnes).map(n => n.title).join(' · '))}</p>
              </div>
              <button id="dismiss-banner" class="shrink-0 w-8 h-8 rounded-full hover:bg-redline/10 flex items-center justify-center text-redline">
                ${ic('x', 'w-4 h-4')}
              </button>
            </div>
          ` : ''}

          ${learnerNav === 'homework' ? renderLearnerHomework(session)
            : learnerNav === 'studio' ? renderCodeStudioEmbed(session)
            : learnerNav === 'notification' ? renderLearnerNotification(session)
            : renderLearnerDashboard(session)}

        </div>
      </main>
    </div>
  </div>
  `;
}

function learnerHomeworkCard(a, studentId, opts) {
  opts = opts || {};
  const sub = getSubmission(a.id, studentId);
  const status = sub ? sub.status : 'pending';
  const btnLabel = status === 'pending' ? 'Do Homework' : status === 'revision' ? 'Fix & Resubmit' : status === 'checked' ? 'View Homework' : 'View & Edit';
  const overdue = isOverdue(a, studentId);
  return `
    <div class="relative bg-papercard rounded-[1.5rem] border border-dashed ${overdue ? 'border-redline/40' : 'border-ink/20'} p-5 pt-7 sm:p-6 sm:pt-8 card-hover flex flex-col">
      ${notch()}
      <div class="flex items-center justify-between mb-3 gap-2 flex-wrap">
        ${statusChip(status)}
        ${typeof sub?.grade === 'number' ? `<span class="font-mono2 text-[10px] font-semibold text-ink bg-ink/5 rounded-full px-2 py-1">${sub.grade}/100</span>` : ''}
        <span class="font-mono2 text-[10px] text-graphite/70 font-medium">${formatDate(a.createdAt).toUpperCase()}</span>
      </div>
      <h3 class="font-semibold text-ink text-[15px] mb-1.5 leading-snug">${escapeHtml(a.title)}</h3>
      ${a.type === 'code' ? `<p class="mb-2"><span class="font-mono2 text-[10px] uppercase tracking-wide text-ochre bg-ochre/8 border border-ochre/20 rounded-full px-2 py-0.5">${a.codeLang}</span></p>` : ''}
      ${a.type === 'mcq' ? `<p class="mb-2"><span class="font-mono2 text-[10px] uppercase tracking-wide text-moss bg-moss/8 border border-moss/20 rounded-full px-2 py-0.5">${(a.mcqQuestions || []).length} question${(a.mcqQuestions || []).length === 1 ? '' : 's'} · auto-graded</span></p>` : ''}
      ${a.dueAt ? `<p class="mb-2 flex items-center gap-1.5 font-mono2 text-[10px] uppercase tracking-wide ${overdue ? 'text-redline' : 'text-graphite'}">${ic('calendar', 'w-3 h-3')} ${dueLabel(a.dueAt)}</p>` : ''}
      <p class="text-xs text-graphite line-clamp-2 mb-5 flex-1">${escapeHtml(a.description)}</p>
      ${status === 'revision' && sub && sub.remark ? `<p class="text-xs text-redline bg-redline/6 border border-redline/20 rounded-xl px-3 py-2 mb-4 leading-relaxed"><strong class="font-semibold">Remark:</strong> ${escapeHtml(sub.remark)}</p>` : ''}
      <button data-open-workspace="${a.id}" class="btn-press w-full py-3 rounded-full font-semibold text-sm text-paper bg-ink hover:bg-[#2a221a] transition-colors duration-300 flex items-center justify-center gap-2 shadow-md shadow-black/15">
        ${ic(a.type === 'code' ? 'code' : a.type === 'mcq' ? 'listChecks' : 'pencil', 'w-4 h-4')} ${btnLabel}
      </button>
    </div>
  `;
}

// ---------- DASHBOARD ----------
function renderLearnerDashboard(session) {
  const studentId = session?.id;
  const assignments = getAssignments().slice().sort((a, b) => b.createdAt - a.createdAt);
  const revision = assignments.filter(a => submissionStatus(a.id, studentId) === 'revision');
  const pending = assignments.filter(a => submissionStatus(a.id, studentId) === 'pending');
  const done = assignments.filter(a => ['submitted', 'checked'].includes(submissionStatus(a.id, studentId)));

  return `
  <div class="flex items-center justify-between mb-8 anim-fade-up stagger-1">
    <div>
      <h1 class="font-display text-2xl sm:text-3xl font-semibold text-ink tracking-tight">Hey, ${escapeHtml((session?.name || 'there').split(' ')[0])}</h1>
      <p class="text-graphite text-sm mt-1.5">${pending.length === 0 && revision.length === 0 ? "You're all caught up — nothing due right now." : `You have ${pending.length + revision.length} homework to take care of.`}</p>
    </div>
    <div class="hidden sm:flex items-center gap-2 font-mono2 text-[10px] tracking-widest uppercase text-graphite bg-papercard border border-ink/10 px-3.5 py-2 rounded-full">
      <span class="w-1.5 h-1.5 rounded-full bg-ink"></span> Stored on device
    </div>
  </div>

  ${revision.length > 0 ? `
  <div class="mb-9 anim-fade-up stagger-2">
    <h2 class="font-display font-semibold text-lg text-redline mb-4 flex items-center gap-2">${ic('alertTriangle', 'w-4 h-4')} Needs Your Attention</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      ${revision.map(a => learnerHomeworkCard(a, studentId)).join('')}
    </div>
  </div>
  ` : ''}

  <div class="mb-9 anim-fade-up stagger-2">
    <h2 class="font-display font-semibold text-lg text-ink mb-4">Pending</h2>
    ${pending.length === 0 ? `
      <div class="bg-papercard rounded-2xl border border-dashed border-ink/20 p-10 text-center">
        <div class="text-ink/25 mx-auto mb-2 w-6 h-6">${ic('sparkle', 'w-6 h-6 mx-auto')}</div>
        <p class="text-sm text-graphite">No pending work. Enjoy the break.</p>
      </div>
    ` : `
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      ${pending.map(a => learnerHomeworkCard(a, studentId)).join('')}
    </div>
    `}
  </div>

  ${done.length > 0 ? `
  <div class="anim-fade-up stagger-3">
    <h2 class="font-display font-semibold text-lg text-ink mb-4">Done</h2>
    <div class="space-y-3">
      ${done.map(a => {
        const sub = getSubmission(a.id, studentId);
        return `
        <div class="bg-papercard rounded-2xl border border-ink/8 p-5 flex items-center gap-4">
          <div class="w-9 h-9 rounded-full bg-ink/5 flex items-center justify-center shrink-0">${ic('checkCircle', 'w-4.5 h-4.5 text-ink/60')}</div>
          <div class="min-w-0 flex-1">
            <h3 class="font-semibold text-ink text-sm truncate">${escapeHtml(a.title)}</h3>
            <p class="font-mono2 text-[10px] text-graphite/70 mt-1 tracking-wide">TURNED IN ${timeAgo(sub.submittedAt).toUpperCase()}</p>
          </div>
          ${typeof sub.grade === 'number' ? `<span class="font-mono2 text-[10px] font-semibold text-ink bg-ink/5 rounded-full px-2 py-1">${sub.grade}/100</span>` : ''}
          ${statusChip(sub.status)}
        </div>
        `;
      }).join('')}
    </div>
  </div>
  ` : ''}
  `;
}

// The embedded code-studio.html posts a message when its Exit button is used;
// catch it here and drop the user back on the dashboard. Wired once, globally,
// since renderCodeStudioEmbed() can be invoked many times across re-renders.
if (!window.__codeStudioExitWired) {
  window.__codeStudioExitWired = true;
  window.addEventListener('message', (e) => {
    const data = e.data;
    if (!data || data.__codeStudioExit !== true) return;
    const session = getSession();
    if (session?.role === 'admin') adminNav = 'dashboard'; else learnerNav = 'dashboard';
    render();
  });
}

        <div class="flex-1 min-h-0 flex flex-col overflow-hidden bg-papercard">
          ${isCode ? `

                <div class="mck-row-scroll flex items-center gap-2 overflow-x-auto">
                  ${['{','}','[',']','(',')','<','>',';',"'",'"','/','\\','|','_','-','=','+','#','.',','].map(ch => `<button type="button" data-mck-ins="${ch === '"' ? '&quot;' : ch}" class="mck-key shrink-0 w-11 h-11 rounded-xl bg-paper/10 text-paper text-lg font-mono2 flex items-center justify-center">${escapeHtml(ch)}</button>`).join('')}
                </div>

              ${isReadOnly ? `

                  ${ic('checkCircle', 'w-5 h-5 text-moss shrink-0')}
                  <p class="text-sm text-ink"><strong class="font-semibold">${(assignment.mcqQuestions || []).filter((q, qi) => mcqAnswers[qi] === q.correct).length} / ${(assignment.mcqQuestions || []).length}</strong> correct — auto-graded on submit.</p>
                </div>
              ` : ''}
              ${(assignment.mcqQuestions || []).map((q, qi) => `
                <div class="mb-6 pb-6 border-b border-ink/10 last:border-0" data-mcq-q="${qi}">
                  <p class="font-semibold text-ink text-sm mb-3">${qi + 1}. ${escapeHtml(q.q)}</p>
                  <div class="space-y-2">
                    ${q.options.map((opt, oi) => {

                        else if (oi === mcqAnswers[qi]) { extraCls = 'border-redline/50 bg-redline/6'; mark = ic('x', 'w-4 h-4 text-redline shrink-0'); }

                      return `
                        <label class="flex items-center gap-3 px-4 py-3 rounded-xl border ${extraCls} transition-colors ${isReadOnly ? '' : 'cursor-pointer'}">
                          <input type="radio" name="mcq-q-${qi}" value="${oi}" class="shrink-0 w-4 h-4 accent-ink" ${mcqAnswers[qi] === oi ? 'checked' : ''} ${isReadOnly ? 'disabled' : ''} />
                          <span class="text-sm text-ink/85 flex-1">${escapeHtml(opt)}</span>
